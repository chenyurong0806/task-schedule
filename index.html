<!DOCTYPE html>
<html lang="zh-CN" class="transition-colors duration-300">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暑假任务管理系统 - MD3 独立子任务调度版 V2.6 (Ultimate)</title>
    <meta name="theme-color" content="#6750A4">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-background: #FEF7FF;
            --md-sys-color-on-background: #1D1B20;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F7F2FA;
            --md-sys-color-surface-container: #F3EDF7;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-surface-container-highest: #E6E1E5;
            --md-sys-color-outline: #79747E;
            --md-sys-color-outline-variant: #CAC4D0;
            --md-sys-color-tertiary-container: #FFD8E4;

            --md-motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
            --md-motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
            --md-motion-duration-short4: 200ms;
            --md-motion-duration-medium1: 250ms;
            --md-motion-duration-long1: 400ms;
        }

        html.dark {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;
            --md-sys-color-background: #141218;
            --md-sys-color-on-background: #E6E1E5;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-surface-container-lowest: #0F0D13;
            --md-sys-color-surface-container-low: #1D1B20;
            --md-sys-color-surface-container: #211F26;
            --md-sys-color-surface-container-high: #2B2930;
            --md-sys-color-surface-container-highest: #333138;
            --md-sys-color-outline: #938F99;
            --md-sys-color-outline-variant: #49454F;
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .md-nav-item .md-icon-wrapper {
            transition: background-color var(--md-motion-duration-short4) var(--md-motion-easing-emphasized);
        }

        .md-nav-item.active .md-icon-wrapper {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            border-radius: 16px;
        }

        .md-ripple {
            position: relative;
            overflow: hidden;
        }

        .md-ripple::after {
            content: "";
            position: absolute;
            inset: 0;
            background-color: currentColor;
            opacity: 0;
            transition: opacity var(--md-motion-duration-short4) linear;
        }

        .md-ripple:hover::after {
            opacity: 0.08;
        }

        .md-ripple:active::after {
            opacity: 0.16;
        }

        #task-drawer {
            transition: transform var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                width var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                opacity var(--md-motion-duration-medium1);
        }

        #task-drawer.collapsed {
            width: 0px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-100%);
        }

        @media (min-width: 768px) {
            #task-drawer.collapsed {
                transform: none;
            }
        }

        .view-pane {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                transform var(--md-motion-duration-long1) var(--md-motion-easing-emphasized);
            pointer-events: none;
            position: absolute;
            inset: 0;
        }

        .view-pane.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            position: relative;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }

        .calendar-grid-month {
            grid-template-rows: auto repeat(6, minmax(0, 1fr));
        }

        .calendar-grid-week {
            grid-template-rows: auto 1fr;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .chip-active {
            background-color: var(--md-sys-color-secondary-container) !important;
            color: var(--md-sys-color-on-secondary-container) !important;
            border-color: transparent !important;
        }

        .drag-hover {
            background-color: var(--md-sys-color-primary-container) !important;
            opacity: 0.85;
            transform: scale(1.02);
            box-shadow: 0 0 0 2px var(--md-sys-color-primary) inset;
            border-radius: 8px;
        }

        .meta-drop-hover {
            background-color: var(--md-sys-color-tertiary-container) !important;
            transform: scale(1.02);
            border: 1px dashed var(--md-sys-color-primary) !important;
            z-index: 10;
            position: relative;
        }

        .timeline-track-container {
            position: relative;
            height: 1440px;
        }

        .timeline-hour-row {
            height: 60px;
            border-bottom: 1px dashed var(--md-sys-color-outline-variant);
            position: relative;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            cursor: ns-resize;
            background-color: rgba(0, 0, 0, 0.12);
            border-radius: 0 0 8px 8px;
            touch-action: none;
        }

        .resize-handle:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }

        #global-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            display: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            background-color: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
            border-radius: 8px;
            padding: 12px;
            max-width: 280px;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .folder-content {
            transition: grid-template-rows var(--md-motion-duration-long1) var(--md-motion-easing-standard);
            display: grid;
            grid-template-rows: 0fr;
        }

        .folder-content.open {
            grid-template-rows: 1fr;
        }

        .folder-inner {
            overflow: hidden;
            min-height: 0;
            padding: 0 !important;
            border: none !important;
        }

        .folder-icon {
            transition: transform var(--md-motion-duration-short4) var(--md-motion-easing-standard);
            transform: rotate(0deg);
        }

        .folder-icon.open {
            transform: rotate(90deg);
        }

        @keyframes locatePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(103, 80, 164, 0.8);
            }

            40% {
                box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.5);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(103, 80, 164, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(103, 80, 164, 0);
            }
        }

        .locate-highlight {
            animation: locatePulse 1s ease-in-out 2;
        }
    </style>
</head>

<body class="h-[100dvh] w-screen flex flex-col md:flex-row select-none overflow-hidden">

    <div id="global-tooltip" class="text-xs flex flex-col gap-1"></div>
    <div id="custom-context-menu" class="fixed hidden z-50 rounded-lg p-1 shadow-xl border text-xs min-w-[150px]"
        style="background-color: var(--md-sys-color-surface-container-high); border-color: var(--md-sys-color-outline-variant);">
    </div>

    <aside
        class="w-full md:w-20 h-16 md:h-full flex flex-row md:flex-col justify-around md:justify-between items-center py-2 md:py-6 flex-shrink-0 order-last md:order-first border-t md:border-t-0 md:border-r z-50 bg-[var(--md-sys-color-surface-container-low)] border-[var(--md-sys-color-outline-variant)] overflow-x-auto no-scrollbar">
        <div class="flex flex-row md:flex-col items-center gap-2 md:gap-5 px-4 md:px-0 w-full md:w-auto">
            <div
                class="hidden md:flex w-12 h-12 rounded-full items-center justify-center text-[var(--md-sys-color-primary)]">
                <span class="material-symbols-outlined text-[32px] font-bold">spellcheck</span>
            </div>
            <nav class="flex flex-row md:flex-col gap-2 md:gap-4 flex-1 md:w-full md:px-2">
                <button onclick="switchView('home')" id="nav-home"
                    class="md-nav-item active flex flex-col items-center gap-1 group md:w-full text-center outline-none px-3 md:px-0">
                    <div class="md-icon-wrapper w-14 h-8 flex items-center justify-center rounded-full"><span
                            class="material-symbols-outlined">home</span></div>
                    <span class="text-[10px] md:text-xs font-medium tracking-wider">首页</span>
                </button>
                <button onclick="switchView('calendar')" id="nav-calendar"
                    class="md-nav-item flex flex-col items-center gap-1 group md:w-full text-center outline-none px-3 md:px-0">
                    <div class="md-icon-wrapper w-14 h-8 flex items-center justify-center rounded-full"><span
                            class="material-symbols-outlined">calendar_month</span></div>
                    <span class="text-[10px] md:text-xs font-medium tracking-wider">日程</span>
                </button>
            </nav>
            <hr class="hidden md:block w-8 border-[var(--md-sys-color-outline-variant)]">
            <div class="flex flex-row md:flex-col gap-1 md:gap-3">
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 rounded-full flex items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="切换深色模式">
                    <span class="material-symbols-outlined" id="dark-mode-icon">dark_mode</span>
                </button>
                <button onclick="triggerDataExport()"
                    class="hidden md:flex w-10 h-10 rounded-full items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="导出备份">
                    <span class="material-symbols-outlined">download</span>
                </button>
                <button onclick="document.getElementById('import-file-input').click()"
                    class="hidden md:flex w-10 h-10 rounded-full items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="导入配置">
                    <span class="material-symbols-outlined">upload</span>
                </button>
                <input type="file" id="import-file-input" class="hidden" accept=".json"
                    onchange="triggerDataImport(event)">
            </div>
        </div>
        <button onclick="openAddTaskModal()"
            class="md-ripple w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-95 flex-shrink-0 mr-4 md:mr-0"
            style="background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);">
            <span class="material-symbols-outlined text-[24px] md:text-[28px]">add</span>
        </button>
    </aside>

    <section id="task-drawer"
        class="absolute md:relative z-40 h-[calc(100%-4rem)] md:h-full w-80 max-w-[85vw] flex flex-col border-r flex-shrink-0 transition-all duration-300 shadow-2xl md:shadow-none"
        style="background-color: var(--md-sys-color-surface-container-lowest); border-color: var(--md-sys-color-outline-variant);"
        ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)" ondrop="dropBackToPool(event)">
        <div class="p-4 flex flex-col gap-3 border-b" style="border-color: var(--md-sys-color-outline-variant);">
            <div class="flex items-center justify-between">
                <h2 class="text-sm font-semibold tracking-wide" style="color: var(--md-sys-color-on-surface-variant);">
                    分类</h2>
                <button onclick="toggleDrawer()"
                    class="w-8 h-8 rounded-full flex items-center justify-center md-ripple hover:bg-black/5 dark:hover:bg-white/5">
                    <span class="material-symbols-outlined text-xl">menu_open</span>
                </button>
            </div>
            <div class="grid grid-cols-2 gap-2" id="drawer-filter-chips">
                <button onclick="changeDrawerArrange('group')" id="chip-group"
                    class="chip-active text-xs py-1.5 px-1 rounded-lg text-center font-medium md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent">默认</button>
                <button onclick="changeDrawerArrange('subject')" id="chip-subject"
                    class="text-xs py-1.5 px-1 rounded-lg text-center font-medium md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent">按学科</button>
                <button onclick="changeDrawerArrange('tag')" id="chip-tag"
                    class="text-xs py-1.5 px-1 rounded-lg text-center font-medium md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent">按标签</button>
                <button onclick="changeDrawerArrange('time')" id="chip-time"
                    class="text-xs py-1.5 px-1 rounded-lg text-center font-medium md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent">按时间</button>
            </div>
            <div id="drawer-quick-add-container" class="gap-1 mt-1 flex items-center" style="display: none;">
                <input type="color" id="drawer-quick-color" value="#6750A4"
                    class="w-6 h-6 p-0 border-0 rounded cursor-pointer hidden flex-shrink-0 bg-transparent" />
                <input type="text" id="drawer-quick-input" placeholder="追加新的分类..."
                    class="flex-1 text-xs px-2 py-1.5 rounded-lg border outline-none bg-[var(--md-sys-color-surface-container-low)] border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface)] min-w-0" />
                <button onclick="executeQuickMetaAdd()"
                    class="px-2 py-1.5 rounded-lg text-xs font-bold bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] md-ripple transition-transform active:scale-95 flex-shrink-0">+</button>
            </div>
        </div>
        <div id="drawer-task-container" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1 no-scrollbar"></div>
    </section>

    <button id="drawer-restore-btn" onclick="toggleDrawer()"
        class="hidden fixed left-4 md:left-24 top-4 w-10 h-10 rounded-full shadow-md flex items-center justify-center z-40 md-ripple bg-[var(--md-sys-color-surface-container-high)] border border-[var(--md-sys-color-outline-variant)]">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <main class="flex-1 h-[100dvh] md:h-full relative overflow-hidden flex flex-col">
        <div id="view-home"
            class="view-pane active p-4 md:p-6 flex flex-col h-full overflow-y-auto lg:overflow-hidden gap-4 md:gap-6">
            <header
                class="w-full max-w-3xl mx-auto flex items-center h-12 md:h-14 rounded-full px-4 shadow-sm flex-shrink-0 gap-2"
                style="background-color: var(--md-sys-color-surface-container-high);">
                <span class="material-symbols-outlined text-[var(--md-sys-color-on-surface-variant)] mr-1">search</span>
                <input type="text" id="global-search" oninput="handleSearchDebounced(this.value)" placeholder="搜索关键词"
                    class="bg-transparent flex-1 outline-none text-sm text-[var(--md-sys-color-on-surface)]" />
                <button onclick="undo()"
                    class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                        class="material-symbols-outlined text-lg">undo</span></button>
                <button onclick="redo()"
                    class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                        class="material-symbols-outlined text-lg">redo</span></button>
            </header>
            <div class="p-4 md:p-5 rounded-2xl flex flex-col gap-3 shadow-sm border border-[var(--md-sys-color-outline-variant)] flex-shrink-0"
                style="background-color: var(--md-sys-color-surface-container-low);">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-sm md:text-base font-bold tracking-tight">总进度</h3>
                        <p class="text-[10px] md:text-xs text-[var(--md-sys-color-on-surface-variant)]"
                            id="stats-summary-text">计算中...</p>
                    </div>
                    <span class="text-xl md:text-2xl font-black" style="color: var(--md-sys-color-primary);"
                        id="global-progress-percent">0%</span>
                </div>
                <div class="w-full h-2 md:h-3 rounded-full overflow-hidden"
                    style="background-color: var(--md-sys-color-surface-variant);">
                    <div id="global-progress-bar" class="h-full rounded-full transition-all duration-700 ease-out"
                        style="width: 0%; background-color: var(--md-sys-color-primary);"></div>
                </div>
            </div>
            <div
                class="flex-1 w-full flex flex-col lg:flex-row gap-4 md:gap-6 overflow-visible lg:overflow-hidden min-h-0">
                <div
                    class="flex-none lg:flex-1 w-full flex flex-col gap-3 overflow-visible lg:overflow-y-auto pr-1 md:pr-2 no-scrollbar min-h-0">
                    <div id="home-checklist-container" class="flex flex-col gap-4 pb-6 md:pb-12"></div>
                </div>
                <div
                    class="flex-none w-full lg:w-72 flex flex-col gap-4 flex-shrink-0 overflow-visible lg:overflow-y-auto lg:h-full min-h-0 pb-6 lg:pb-0">
                    <div
                        class="p-4 rounded-2xl flex flex-col gap-3 bg-rose-100/40 dark:bg-rose-950/20 border border-rose-300/60 shadow-sm flex-shrink-0">
                        <div class="flex items-center gap-2 text-rose-700 dark:text-rose-400 font-bold text-xs"><span
                                class="material-symbols-outlined text-sm">warning</span> 逾期任务</div>
                        <div id="overdue-tasks-container"
                            class="flex flex-col gap-2 max-h-40 md:max-h-48 overflow-y-auto no-scrollbar"></div>
                    </div>
                    <div
                        class="p-4 rounded-2xl flex flex-col gap-3 border border-[var(--md-sys-color-outline-variant)] shadow-sm bg-[var(--md-sys-color-surface-container-low)] min-h-[200px] lg:flex-1">
                        <div class="flex items-center gap-2 text-[var(--md-sys-color-primary)] font-bold text-xs"><span
                                class="material-symbols-outlined text-sm">event_upcoming</span> 今日任务</div>
                        <div id="today-tasks-container" class="flex-1 overflow-y-auto flex flex-col gap-2 no-scrollbar">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-calendar" class="view-pane p-4 md:p-6 flex flex-col h-full overflow-hidden gap-4">
            <div class="flex justify-between items-center flex-shrink-0 pl-12 md:pl-0 transition-all gap-2">
                <div class="flex items-center gap-2 md:gap-4 flex-wrap">
                    <h2 class="text-base md:text-xl font-bold tracking-tight" id="calendar-month-title">加载中...</h2>
                    <div
                        class="flex items-center rounded-full border overflow-hidden shadow-sm bg-[var(--md-sys-color-surface-container-lowest)] border-[var(--md-sys-color-outline-variant)]">
                        <button onclick="switchCalendarDate(-1)"
                            class="p-1 md:p-1.5 hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface)] flex items-center transition-colors"><span
                                class="material-symbols-outlined text-sm">chevron_left</span></button>
                        <button onclick="switchCalendarDate(1)"
                            class="p-1 md:p-1.5 hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface)] flex items-center transition-colors"><span
                                class="material-symbols-outlined text-sm">chevron_right</span></button>
                    </div>
                </div>
                <div class="flex items-center gap-1">
                    <button onclick="undo()"
                        class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                            class="material-symbols-outlined text-lg">undo</span></button>
                    <button onclick="redo()"
                        class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                            class="material-symbols-outlined text-lg">redo</span></button>
                    <div
                        class="flex items-center gap-1 bg-[var(--md-sys-color-surface-container-high)] p-1 rounded-full shadow-sm border border-[var(--md-sys-color-outline-variant)] ml-2">
                        <button id="view-mode-month" onclick="switchCalendarMode('month')"
                            class="px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs font-semibold bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] transition-all">月历</button>
                        <button id="view-mode-week" onclick="switchCalendarMode('week')"
                            class="px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs font-semibold text-[var(--md-sys-color-on-surface-variant)] transition-all">周历</button>
                    </div>
                </div>
            </div>
            <div class="flex-1 w-full flex flex-col gap-4 overflow-hidden relative min-h-0">
                <div id="calendar-month-view"
                    class="w-full flex-shrink-0 rounded-2xl border p-1 md:p-2 flex flex-col shadow-sm transition-all duration-300 border-[var(--md-sys-color-outline-variant)] bg-[var(--md-sys-color-surface-container-lowest)] overflow-y-auto"
                    style="height: 100%;">
                    <div class="calendar-grid calendar-grid-month flex-1 h-full text-xs" id="month-grid-container">
                    </div>
                </div>
                <div id="calendar-timeline-pane"

        const defaultInitialState = {

                    ]
                },
                {
                    id: "batch-demo-02", title: "英语3500词高效循环背诵", content: "复习并默写核心变形词及短语。", subject: "英语", tags: ["高频高燃"],
                    subtasks: [
                        { id: "sub-201", text: "Unit 1 核心词默写", weight: 1, done: true, endDate: TODAY_STR, startMinute: 780, durationMinutes: 180 },
                        { id: "sub-202", text: "Unit 2 完形填空精讲", weight: 1, done: false, endDate: null, startMinute: 480, durationMinutes: 120 }
                    ]
                }
            ],
            tags: [{ name: "高难度", color: "#E53935" }, { name: "急需突破", color: "#FB8C00" }, { name: "高频高燃", color: "#3949AB" }],
            subjects: ["语文", "数学", "英语", "物理", "化学", "地理"],
            currentDrawerArrange: "group", searchQuery: "", selectedFormSubject: "数学", selectedFormTags: [],
            calendarYear: parseInt(TODAY_STR.split('-')[0]), calendarMonth: parseInt(TODAY_STR.split('-')[1]), calendarMode: "month", focusedDate: TODAY_STR
        };

        let appState = {};
        let historyStack = []; let historyIndex = -1; let isRestoring = false;
        let searchDebounceTimer = null;
        let timelineInteractionCtx = { type: null, subtaskId: null, initialY: 0, initialStartMinute: 0, initialDuration: 0 };
        let timelineLayoutCache = {};
        let contextMenuCtx = { type: null, arg1: null, arg2: null, arg3: null };
        let isGlobalDragging = false;
        let isTouch = false;

        const subjectColors = {
            "语文": { bg: "#F3E5F5", text: "#4A148C" }, "数学": { bg: "#E3F2FD", text: "#0D47A1" },
            "英语": { bg: "#E1F5FE", text: "#01579B" }, "物理": { bg: "#E8EAF6", text: "#1A237E" },
            "化学": { bg: "#E0F2F1", text: "#004D40" }, "地理": { bg: "#EFEBE9", text: "#4E342E" }
        };

        const SUPABASE_URL = 'https://mamubvgmcetepllznifl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_HEeNPSqD75cWlnmZjcVHKA_Pw-OdL_A';
        const BUCKET_NAME = 'schedule-data';
        const FILE_NAME = 'data.json';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadStateFromSupabase() {
            try {
                const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).download(FILE_NAME);
                if (error) throw error;
                const text = await data.text();
                const parsed = JSON.parse(text);
                localStorage.setItem("MD3_ATOMIC_SYSTEM_DATA", JSON.stringify(parsed)); return parsed;
            } catch (err) {
                const cached = localStorage.getItem("MD3_ATOMIC_SYSTEM_DATA");
                if (cached) { try { return JSON.parse(cached); } catch (e) { } }
                return JSON.parse(JSON.stringify(defaultInitialState));
            }
        }

        function commitState() {
            if (isRestoring) return;
            if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(JSON.parse(JSON.stringify(appState)));
            if (historyStack.length > 50) historyStack.shift(); else historyIndex++;
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--; isRestoring = true;
                appState = JSON.parse(JSON.stringify(historyStack[historyIndex]));
                saveStateToStorage(false); renderAllComponents(); isRestoring = false;
            }
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++; isRestoring = true;
                appState = JSON.parse(JSON.stringify(historyStack[historyIndex]));
                saveStateToStorage(false); renderAllComponents(); isRestoring = false;
            }
        }

        function saveStateToStorage(pushHistory = true) {
            if (pushHistory) commitState();
            localStorage.setItem("MD3_ATOMIC_SYSTEM_DATA", JSON.stringify(appState));
            supabaseClient.storage.from(BUCKET_NAME).upload(FILE_NAME, JSON.stringify(appState), { upsert: true, contentType: 'application/json' }).catch(() => { });
        }

        document.addEventListener("DOMContentLoaded", async () => {
            appState = await loadStateFromSupabase();
            appState.searchQuery = "";
            commitState();
            initializeTheme();
            renderAllComponents();

            document.addEventListener("click", () => { document.getElementById("custom-context-menu").style.display = "none"; });
            document.addEventListener("dragstart", () => { isGlobalDragging = true; hideGlobalTooltip(); });
            document.addEventListener("dragend", () => { isGlobalDragging = false; });
            document.addEventListener("drop", () => { isGlobalDragging = false; });

            window.addEventListener('touchstart', () => isTouch = true, { passive: true });

            let swipeStartX = 0, swipeStartY = 0;
            document.addEventListener('touchstart', e => { swipeStartX = e.changedTouches[0].screenX; swipeStartY = e.changedTouches[0].screenY; }, { passive: true });
            document.addEventListener('touchend', e => {
                const endX = e.changedTouches[0].screenX, endY = e.changedTouches[0].screenY;
                if (Math.abs(endY - swipeStartY) > 50) return;
                const diff = swipeStartX - endX;
                const inCalendar = document.getElementById('view-calendar').classList.contains('active');
                if (inCalendar && appState.calendarMode === 'week' && Math.abs(diff) > 50) {
                    if (e.target.closest('#calendar-timeline-pane')) {
                        let d = new Date(appState.focusedDate); d.setDate(d.getDate() + (diff > 0 ? 1 : -1));
                        appState.focusedDate = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                        focusDayTimeline(appState.focusedDate); renderCalendarWorkspace();
                    } else if (e.target.closest('#calendar-month-view')) {
                        switchCalendarDate(diff > 0 ? 1 : -1);
                    }
                }
            }, { passive: true });

            document.addEventListener('keydown', e => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') { e.preventDefault(); undo(); }
                    if (e.key === 'y') { e.preventDefault(); redo(); }
                }
            });
        });

        function findSubtask(subtaskId) {
            for (let b of appState.batches) { let s = b.subtasks.find(x => x.id === subtaskId); if (s) return { batch: b, subtask: s }; }
            return null;
        }

        function jumpToCalendar(dateStr) {
            if (!dateStr || dateStr === '待分发' || dateStr === 'null') { alert("该任务尚未分配日期。"); return; }
            appState.focusedDate = dateStr; const d = new Date(dateStr); if (isNaN(d.getTime())) return;
            appState.calendarYear = d.getFullYear(); appState.calendarMonth = d.getMonth() + 1;
            switchCalendarMode('month'); switchView('calendar');
            setTimeout(() => {
                const cells = document.querySelectorAll('#month-grid-container > div');
                cells.forEach(el => {
                    if (el.dataset.date === dateStr) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('locate-highlight'); setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                    }
                });
            }, 300);
        }

        function jumpToHome(subtaskId) {
            switchView('home');
            setTimeout(() => {
                const el = document.getElementById('home-sub-' + subtaskId);
                if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('locate-highlight'); setTimeout(() => el.classList.remove('locate-highlight'), 2000); }
            }, 300);
        }

        function expandToDrawerTask(subtaskId) {
            switchView('home'); changeDrawerArrange('time'); document.getElementById('task-drawer').classList.remove('collapsed');
            setTimeout(() => {
                const el = document.querySelector(`#drawer-task-container [data-subtask-id="${subtaskId}"]`);
                if (el) {
                    let parent = el.parentElement;
                    while (parent && parent.id !== 'drawer-task-container') {
                        if (parent.classList.contains('folder-content')) {
                            parent.classList.add('open');
                            const icon = parent.previousElementSibling?.querySelector('.folder-icon');
                            if (icon) icon.classList.add('open');
                        }
                        parent = parent.parentElement;
                    }
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('locate-highlight'); setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                }
            }, 300);
        }

        function allowDrop(e) { e.preventDefault(); }
        function handleDragLeave(e) { e.currentTarget.classList.remove("drag-hover", "meta-drop-hover"); }

        function handleSubtaskDragStart(e, subtaskId) {
            e.dataTransfer.setData("text/plain", subtaskId); e.dataTransfer.effectAllowed = "move";
            isGlobalDragging = true; hideGlobalTooltip(); document.getElementById("custom-context-menu").style.display = "none";
        }

        function dropBackToPool(e) {
            e.preventDefault(); e.currentTarget.classList.remove("drag-hover");
            const subtaskId = e.dataTransfer.getData("text/plain"); const target = findSubtask(subtaskId);
            if (target) { target.subtask.endDate = null; saveStateToStorage(); renderAllComponents(); }
            isGlobalDragging = false;
        }

        function dropToCalendarCell(e, dateStr, cellEl) {
            e.preventDefault(); cellEl.classList.remove("drag-hover");
            const subtaskId = e.dataTransfer.getData("text/plain"); const target = findSubtask(subtaskId);
            if (target) { target.subtask.endDate = dateStr; saveStateToStorage(); renderAllComponents(); if (appState.calendarMode === 'week') focusDayTimeline(appState.focusedDate); }
            isGlobalDragging = false;
        }

        function dropToTimelineTrack(e) {
            e.preventDefault();
            const subtaskId = e.dataTransfer.getData("text/plain"); const target = findSubtask(subtaskId); if (!target) return;
            const rect = document.getElementById("timeline-track-wrapper").getBoundingClientRect();
            const dropY = (e.clientY || (e.changedTouches && e.changedTouches[0].clientY)) - rect.top;
            let targetMinute = Math.round(dropY / 10) * 10; targetMinute = Math.max(0, Math.min(1440 - target.subtask.durationMinutes, targetMinute));
            target.subtask.endDate = appState.focusedDate; target.subtask.startMinute = targetMinute;
            saveStateToStorage(); renderAllComponents(); focusDayTimeline(appState.focusedDate); isGlobalDragging = false;
        }

        function startTimelineCardDrag(e, subtaskId) {
            e.stopPropagation(); if (e.type !== 'touchstart') e.preventDefault();
            timelineInteractionCtx.type = 'drag'; timelineInteractionCtx.subtaskId = subtaskId;
            timelineInteractionCtx.initialY = e.clientY || (e.touches && e.touches[0].clientY);
            const target = findSubtask(subtaskId); timelineInteractionCtx.initialStartMinute = target.subtask.startMinute;
            isGlobalDragging = true; hideGlobalTooltip();
            window.addEventListener("mousemove", doTimelineResizeOrDrag); window.addEventListener("mouseup", stopTimelineResizeOrDrag);
            window.addEventListener("touchmove", doTimelineResizeOrDrag, { passive: false }); window.addEventListener("touchend", stopTimelineResizeOrDrag);
        }

        function startTimelineResize(e, subtaskId) {
            e.stopPropagation(); if (e.type !== 'touchstart') e.preventDefault();
            timelineInteractionCtx.type = 'resize'; timelineInteractionCtx.subtaskId = subtaskId;
            timelineInteractionCtx.initialY = e.clientY || (e.touches && e.touches[0].clientY);
            const target = findSubtask(subtaskId); timelineInteractionCtx.initialDuration = target.subtask.durationMinutes;
            isGlobalDragging = true; hideGlobalTooltip();
            window.addEventListener("mousemove", doTimelineResizeOrDrag); window.addEventListener("mouseup", stopTimelineResizeOrDrag);
            window.addEventListener("touchmove", doTimelineResizeOrDrag, { passive: false }); window.addEventListener("touchend", stopTimelineResizeOrDrag);
        }

        function doTimelineResizeOrDrag(e) {
            if (!timelineInteractionCtx.type) return; if (e.type === 'touchmove') e.preventDefault();
            const currentY = e.clientY || (e.touches && e.touches[0].clientY);
            const deltaY = currentY - timelineInteractionCtx.initialY; const minuteDelta = Math.round(deltaY / 10) * 10;
            const target = findSubtask(timelineInteractionCtx.subtaskId); if (!target) return;
            if (timelineInteractionCtx.type === 'resize') { let newDur = timelineInteractionCtx.initialDuration + minuteDelta; target.subtask.durationMinutes = Math.max(10, Math.min(1440 - target.subtask.startMinute, newDur)); }
            else if (timelineInteractionCtx.type === 'drag') { let newStart = timelineInteractionCtx.initialStartMinute + minuteDelta; target.subtask.startMinute = Math.max(0, Math.min(1440 - target.subtask.durationMinutes, newStart)); }
            focusDayTimeline(appState.focusedDate);
        }

        function stopTimelineResizeOrDrag() {
            if (timelineInteractionCtx.type) {
                timelineInteractionCtx.type = null; timelineInteractionCtx.subtaskId = null;
                window.removeEventListener("mousemove", doTimelineResizeOrDrag); window.removeEventListener("mouseup", stopTimelineResizeOrDrag);
                window.removeEventListener("touchmove", doTimelineResizeOrDrag); window.removeEventListener("touchend", stopTimelineResizeOrDrag);
                isGlobalDragging = false; saveStateToStorage(); renderAllComponents();
            }
        }

        function showGlobalTooltip(e, subtaskId) {
            if (isGlobalDragging || isTouch) return;
            const target = findSubtask(subtaskId); if (!target) return;
            const tooltip = document.getElementById("global-tooltip");
            let startM_v = target.subtask.startMinute || 480;
            let startH = String(Math.floor(startM_v / 60)).padStart(2, '0'); let startM = String(startM_v % 60).padStart(2, '0');
            let endTotal = startM_v + target.subtask.durationMinutes; let endH = String(Math.floor(endTotal / 60)).padStart(2, '0'); let endM = String(endTotal % 60).padStart(2, '0');
            tooltip.innerHTML = `

                <div class="text-[var(--md-sys-color-on-surface-variant)] font-medium">属: ${target.batch.title}</div>
                <div class="mt-1.5 flex gap-2"><span class="px-1.5 py-0.5 bg-black/5 dark:bg-white/10 rounded border border-[var(--md-sys-color-outline-variant)]">科: ${target.batch.subject}</span></div>

            `;
            tooltip.style.display = "block"; tooltip.style.left = `${(e.clientX || (e.touches && e.touches[0].clientX)) + 14}px`; tooltip.style.top = `${(e.clientY || (e.touches && e.touches[0].clientY)) + 14}px`;
        }
        function hideGlobalTooltip() { document.getElementById("global-tooltip").style.display = "none"; }

        function handleContextMenu(e, type, arg1, arg2, arg3) {
            e.preventDefault(); e.stopPropagation(); hideGlobalTooltip();

            const menu = document.getElementById("custom-context-menu");
            let html = '';

            if (type === 'task_home' || type === 'task_drawer' || type === 'task_calendar') {

                }

                if (type !== 'task_home') {
                    html += `<button onclick="executeContextMenuAction('locate_home')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">home</span>定位到首页</button>`;
                }
                if (type !== 'task_calendar') {
                    html += `<button onclick="executeContextMenuAction('locate_calendar')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors ${!hasDate ? 'opacity-50 cursor-not-allowed' : ''}" ${!hasDate ? 'disabled' : ''}><span class="material-symbols-outlined text-sm">explore</span>定位到日历</button>`;
                }

                html += `<button onclick="executeContextMenuAction('edit')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">edit</span>编辑主任务</button>`;

                if (type === 'task_calendar') {
                    html += `<button onclick="executeContextMenuAction('unassign')" class="w-full text-left px-3 py-2 rounded-md hover:bg-orange-500/10 text-orange-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">event_busy</span>取消分配</button>`;
                    html += `<button onclick="executeContextMenuAction('unassign_time')" class="w-full text-left px-3 py-2 rounded-md hover:bg-orange-500/10 text-orange-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">timer_off</span>取消分配具体时间</button>`;

        function getWeekNumberInMonth(dateStr) {
            const d = new Date(dateStr); const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
            const pastDays = d.getDate() + (firstDay.getDay() === 0 ? 7 : firstDay.getDay()) - 1; return Math.ceil(pastDays / 7);
        }

        function getDatesForWeek(dateStr) {
            const d = new Date(dateStr); let day = d.getDay(); if (day === 0) day = 7;
            d.setDate(d.getDate() - day + 1); const dates = [];
            for (let i = 0; i < 7; i++) { dates.push(new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]); d.setDate(d.getDate() + 1); } return dates;
        }

        function switchCalendarDate(dir) {
            if (appState.calendarMode === 'month') {
                appState.calendarMonth += dir;
                if (appState.calendarMonth > 12) { appState.calendarMonth = 1; appState.calendarYear++; }
                if (appState.calendarMonth < 1) { appState.calendarMonth = 12; appState.calendarYear--; }
                appState.focusedDate = `${appState.calendarYear}-${String(appState.calendarMonth).padStart(2, '0')}-01`;
            } else {
                const d = new Date(appState.focusedDate); d.setDate(d.getDate() + dir * 7);
                appState.focusedDate = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                appState.calendarMonth = d.getMonth() + 1; appState.calendarYear = d.getFullYear();
            } renderCalendarWorkspace();

                cell.addEventListener("dragenter", (e) => { e.preventDefault(); counter++; if (counter === 1) cell.classList.add("drag-hover"); });
                cell.addEventListener("dragleave", () => { counter--; if (counter === 0) cell.classList.remove("drag-hover"); });

        function focusDayTimeline(dateStr) {
            if (appState.calendarMode !== 'week') return;
            document.getElementById("timeline-focused-title").innerHTML = `<span class="material-symbols-outlined text-sm">schedule</span> ${dateStr.substring(5)} 时间轴`;
            const bgTrack = document.getElementById("timeline-hours-bg"); bgTrack.innerHTML = "";
            for (let h = 0; h < 24; h++) {
                const row = document.createElement("div");
                row.className = "timeline-hour-row flex items-start pl-10 md:pl-12 pt-1 select-none border-[var(--md-sys-color-outline-variant)]";
                row.innerHTML = `<span class="absolute left-1 md:left-2 text-[9px] md:text-[10px] font-mono text-[var(--md-sys-color-outline)] font-bold">${h < 10 ? '0' + h : h}:00</span>`;
                bgTrack.appendChild(row);
            }
            const cardPool = document.getElementById("timeline-cards-pool"); cardPool.innerHTML = "";
            let dayTasks = [];
            appState.batches.forEach(b => b.subtasks.forEach(s => {
                if (s.endDate === dateStr && s.startMinute !== null && s.startMinute !== undefined) {
                    dayTasks.push({ batch: b, subtask: s });
                }
            }));
            dayTasks.sort((a, b) => a.subtask.startMinute - b.subtask.startMinute);

            let isDragging = timelineInteractionCtx.type !== null;
            if (!isDragging) {
                timelineLayoutCache = {}; let overlapGroups = [];
                dayTasks.forEach(task => {
                    let placed = false;
                    for (let group of overlapGroups) {
                        let overlaps = group.some(other => {
                            const s1 = task.subtask.startMinute, e1 = s1 + task.subtask.durationMinutes;
                            const s2 = other.subtask.startMinute, e2 = s2 + other.subtask.durationMinutes;
                            return Math.max(s1, s2) < Math.min(e1, e2);
                        });
                        if (overlaps) { group.push(task); task.colIndex = group.length - 1; placed = true; break; }
                    }
                    if (!placed) { task.colIndex = 0; overlapGroups.push([task]); }
                });
                overlapGroups.forEach(group => group.forEach(t => t.groupTotal = group.length));
                dayTasks.forEach(t => { timelineLayoutCache[t.subtask.id] = { c: t.colIndex, g: t.groupTotal }; });
            } else {
                dayTasks.forEach(t => {
                    if (timelineLayoutCache[t.subtask.id]) { t.colIndex = timelineLayoutCache[t.subtask.id].c; t.groupTotal = timelineLayoutCache[t.subtask.id].g; }
                    else { t.colIndex = 0; t.groupTotal = 1; }
                });
            }

            dayTasks.forEach(item => {
                const { batch, subtask } = item;
                const topPx = subtask.startMinute; const heightPx = subtask.durationMinutes;
                const widthPct = 100 / item.groupTotal; const leftPct = item.colIndex * widthPct;
                const block = document.createElement("div"); block.id = `tl-sub-${subtask.id}`;
                block.className = `absolute rounded-xl p-1.5 md:p-2.5 text-[10px] md:text-xs text-white font-bold shadow-md select-none group flex flex-col border border-white/20 transition-all active:scale-[0.99] active:shadow-lg ${subtask.done ? 'opacity-60 saturate-50 line-through' : ''}`;
                block.style.top = `${topPx}px`; block.style.height = `${heightPx}px`;
                block.style.left = `calc(${leftPct}% + 2px)`; block.style.width = `calc(${widthPct}% - 4px)`;
                block.style.backgroundColor = subjectColors[batch.subject]?.text || "var(--md-sys-color-primary)";
                let startH = String(Math.floor(subtask.startMinute / 60)).padStart(2, '0'); let startM = String(subtask.startMinute % 60).padStart(2, '0');
                block.innerHTML = `
                    <div class="flex-1 overflow-hidden pointer-events-none">
                        <div class="truncate">${subtask.text}</div>
                        <div class="text-[9px] md:text-[10px] opacity-90 font-mono mt-0.5 font-normal tracking-wide ${subtask.done ? 'hidden' : ''}">${startH}:${startM} (${subtask.durationMinutes}m)</div>
                    </div>
                    <div class="resize-handle" onmousedown="startTimelineResize(event, '${subtask.id}')" ontouchstart="startTimelineResize(event, '${subtask.id}')">
                        <div class="w-6 md:w-8 h-1 bg-white/40 rounded-full mx-auto mt-1 pointer-events-none group-hover:bg-white/80 transition-colors"></div>
                    </div>
                `;
                block.addEventListener("mousedown", (e) => { if (!e.target.closest('.resize-handle')) startTimelineCardDrag(e, subtask.id); });
                block.addEventListener("touchstart", (e) => { if (!e.target.closest('.resize-handle')) startTimelineCardDrag(e, subtask.id); }, { passive: false });
                let timer;
                block.addEventListener("touchstart", (e) => { timer = setTimeout(() => handleContextMenu(e, 'task_calendar', batch.id, subtask.id), 500); });
                block.addEventListener("touchend", () => clearTimeout(timer)); block.addEventListener("touchmove", () => clearTimeout(timer));
                block.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_calendar', batch.id, subtask.id));
                block.addEventListener("mousemove", (e) => showGlobalTooltip(e, subtask.id)); block.addEventListener("mouseleave", hideGlobalTooltip);
                cardPool.appendChild(block);
            });
        }

            });
            if (!overdue.children.length) overdue.innerHTML = `<div class="text-[10px] text-emerald-500 text-center py-2 font-bold bg-emerald-500/10 rounded-lg">计划内无滞留！</div>`;
            if (!today.children.length) today.innerHTML = `<div class="text-[11px] text-[var(--md-sys-color-outline)] text-center py-4 border border-dashed rounded-lg border-[var(--md-sys-color-outline-variant)]">今日无作业包。</div>`;
        }

        function toggleSubtaskStatus(subtaskId) {
            const target = findSubtask(subtaskId); if (target) { target.subtask.done = !target.subtask.done; saveStateToStorage(); renderAllComponents(); }
        }
        function deleteEntireBatch(id) { appState.batches = appState.batches.filter(b => b.id !== id); saveStateToStorage(); renderAllComponents(); }
        function handleSearchDebounced(val) { clearTimeout(searchDebounceTimer); searchDebounceTimer = setTimeout(() => { appState.searchQuery = val.trim(); renderHomeChecklist(); }, 200); }

        function switchView(viewName) {
            document.querySelectorAll('.md-nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(`nav-${viewName}`)?.classList.add('active');
            document.getElementById(`view-${viewName}`)?.classList.add('active');
            if (viewName === 'calendar') { switchCalendarMode('month'); renderCalendarWorkspace(); }
        }

        function toggleDrawer() {
            const drawer = document.getElementById('task-drawer'); drawer.classList.toggle('collapsed');
            document.getElementById('drawer-restore-btn').classList.toggle('hidden', !drawer.classList.contains('collapsed'));
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle("dark"); localStorage.setItem("THEME_DARK_MODE", isDark ? "true" : "false");
            document.getElementById("dark-mode-icon").innerText = isDark ? "light_mode" : "dark_mode";
        }
        function initializeTheme() {
            const isDark = localStorage.getItem("THEME_DARK_MODE") === "true"; document.documentElement.classList.toggle("dark", isDark);
            document.getElementById("dark-mode-icon").innerText = isDark ? "light_mode" : "dark_mode";
        }
        function triggerDataExport() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
            const anchor = document.createElement('a'); anchor.setAttribute("href", dataStr); anchor.setAttribute("download", `MD3_ATOMIC_DATA.json`); anchor.click(); anchor.remove();
        }
        function triggerDataImport(e) {
            const file = e.target.files[0]; if (!file) return; const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const data = JSON.parse(evt.target.result); if (data.batches) { appState = data; saveStateToStorage(); renderAllComponents(); alert("配置复原成功！"); }
                } catch (err) { alert("非法配置文件。"); }
            }; reader.readAsText(file);
        }

        function renderAllComponents() {
            calculateAndRenderStatistics(); renderHomeChecklist(); renderLeftDrawerPool();
            renderSpecialTaskLists(); renderCalendarWorkspace();
        }
    </script>
</body>

</html>
