        function handleFormSubmit(e) {
            e.preventDefault();
            const bId = document.getElementById("form-task-id").value;
            const title = document.getElementById("form-title").value.trim();
            const content = document.getElementById("form-content").value.trim();
            const originalBatch = bId ? appState.batches.find(b => b.id === bId) : null;
            const subtasks = [];
            document.querySelectorAll("#form-checklist-slots > div").forEach((div, idx) => {
                const text = div.querySelector(".checklist-text-input").value.trim();
                const weight = parseInt(div.querySelector(".checklist-weight-input")?.value) || 1;
                if (text) {
                    let doneStatus = false;
                    let compAt = null;
                    if (div.dataset.subId && originalBatch) {
                        const originalSub = originalBatch.subtasks.find(s => s.id === div.dataset.subId);
                        if (originalSub) { doneStatus = originalSub.done; compAt = originalSub.completedAt; }
                    }
                    subtasks.push({
                        id: div.dataset.subId || `sub-${Date.now()}-${idx}`,
                        text: text, weight: weight, done: doneStatus, completedAt: compAt,
                        endDate: div.dataset.endDate || null,
                        startMinute: (div.dataset.startMinute !== "null" && div.dataset.startMinute !== undefined) ? parseInt(div.dataset.startMinute) : 480,
                        durationMinutes: parseInt(div.dataset.durationMinutes) || 120
                    });
                }
            });
            if (bId) {
                const existing = appState.batches.find(b => b.id === bId);
                if (existing) {
                    existing.title = title; existing.content = content; existing.subject = appState.selectedFormSubject;
                    existing.tags = [...appState.selectedFormTags]; existing.subtasks = subtasks;
                }
            } else {
                appState.batches.unshift({
                    id: `batch-${Date.now()}`, title, content, subject: appState.selectedFormSubject, tags: [...appState.selectedFormTags], subtasks
                });
            }
            saveStateToStorage();
            closeAddTaskModal();
            renderAllComponents();
        }

        function calculateAndRenderStatistics() {
            let totalWeight = 0, completedWeight = 0, totalItems = 0;
            appState.batches.forEach(b => b.subtasks.forEach(s => {
                const w = s.weight || 1;
                totalItems++; totalWeight += w;
                if (s.done) completedWeight += w;
            }));
            const percent = totalWeight === 0 ? 0 : Math.round((completedWeight / totalWeight) * 100);
            document.getElementById("global-progress-percent").innerText = `${percent}%`;
            document.getElementById("global-progress-bar").style.width = `${percent}%`;
            document.getElementById("stats-summary-text").innerText = `共 ${appState.batches.length} 门学科， ${totalItems} 项子任务。`;
        }

        function renderSpecialTaskLists() {
            const overdue = document.getElementById("overdue-tasks-container"),
                today = document.getElementById("today-tasks-container");
            if (!overdue || !today) return;
            overdue.innerHTML = "";
            today.innerHTML = "";

            appState.batches.forEach(b => {
                b.subtasks.forEach(s => {
                    if (s.endDate) {
                        const isOverdue = s.endDate < TODAY_STR;
                        const isToday = s.endDate === TODAY_STR;

                        // Overdue tasks completed before today shouldn't be visible in overdue list
                        if (isOverdue && s.done && (!s.completedAt || s.completedAt < TODAY_STR)) {
                            return;
                        }

                        if (!isOverdue && !isToday) return;

                        const item = document.createElement("div");
                        item.id = `today-item-${s.id}`;
                        item.setAttribute("draggable", "true");
                        item.addEventListener("dragstart", (e) => handleSubtaskDragStart(e, s.id));

                        let baseClass = "p-2 rounded-lg bg-[var(--md-sys-color-surface-container-lowest)] text-xs font-medium shadow-sm cursor-pointer hover:bg-black/5 flex items-center gap-2 transition-colors";
                        if (s.done) baseClass += " line-through opacity-50 saturate-50";

                        let borderColorClass = "";
                        if (isOverdue) borderColorClass = "border-l-4 border-rose-500";
                        else if (isToday) borderColorClass = "border-l-4 border-[var(--md-sys-color-primary)]";

                        item.className = `${baseClass} ${borderColorClass}`;

                        const checkboxClass = isOverdue
                            ? "w-4 h-4 appearance-none rounded border-2 border-[var(--md-sys-color-outline)] checked:border-rose-500 checked:bg-rose-500 transition-colors peer cursor-pointer"
                            : "w-4 h-4 appearance-none rounded border-2 border-[var(--md-sys-color-outline)] checked:border-[var(--md-sys-color-primary)] checked:bg-[var(--md-sys-color-primary)] transition-colors peer cursor-pointer";

                        item.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_today', b.id, s.id));
                        item.addEventListener("click", (e) => {
                            if (e.target.tagName.toLowerCase() === 'input') return;
                            expandToDrawerTask(s.id);
                        });

                        let dateLabel = "";
                        if (isOverdue) dateLabel = `<span class="text-[9px] text-rose-500 font-mono bg-rose-500/10 px-1 py-0.5 rounded w-max">截止日期: ${s.endDate}</span>`;

                        // Fixed bug: changed sub.done to s.done to prevent ReferenceError
                        item.innerHTML = `
                            <div class="relative flex items-center justify-center flex-shrink-0" onclick="event.stopPropagation()">
                                <input type="checkbox" ${s.done ? 'checked' : ''} onchange="toggleSubtaskStatus('${s.id}')" class="${checkboxClass}" />
                                <span class="material-symbols-outlined text-[14px] text-white absolute opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity font-bold">check</span>
                            </div>
                            <div class="flex-1 min-w-0 flex flex-col gap-0.5">
                                <span class="truncate block ${isOverdue ? 'text-rose-700 dark:text-rose-400' : 'text-[var(--md-sys-color-primary)]'}">${s.text}</span>
                                ${dateLabel}
                            </div>
                        `;

                        if (isOverdue) overdue.appendChild(item);
                        else if (isToday) today.appendChild(item);
                    }
                });
            });

            if (!overdue.children.length) overdue.innerHTML = `<div class="text-[10px] text-emerald-500 text-center py-2 font-bold bg-emerald-500/10 rounded-lg">计划内无滞留！</div>`;
            if (!today.children.length) today.innerHTML = `<div class="text-[11px] text-[var(--md-sys-color-outline)] text-center py-4 border border-dashed rounded-lg border-[var(--md-sys-color-outline-variant)]">今日无安排</div>`;
        }

        function toggleSubtaskStatus(subtaskId) {
            const target = findSubtask(subtaskId);
            if (target) {
                target.subtask.done = !target.subtask.done;
                target.subtask.completedAt = target.subtask.done ? TODAY_STR : null;
                saveStateToStorage();
                renderAllComponents();
            }
        }

        function deleteEntireBatch(id) {
            appState.batches = appState.batches.filter(b => b.id !== id);
            saveStateToStorage();
            renderAllComponents();
        }

        function handleSearchDebounced(val) {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                appState.searchQuery = val.trim();
                renderHomeChecklist();
            }, 200);
        }

        function switchView(viewName) {
            document.querySelectorAll('.md-nav-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.view-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(`nav-${viewName}`)?.classList.add('active');
            document.getElementById(`view-${viewName}`)?.classList.add('active');
            if (viewName === 'calendar') {
                switchCalendarMode('month');
            }
            if (viewName === 'today') {
                document.getElementById("today-date-display").innerText = TODAY_STR;
                renderSpecialTaskLists();
            }
        }

        function toggleDrawer() {
            const drawer = document.getElementById('task-drawer');
            drawer.classList.toggle('collapsed');
            document.getElementById('drawer-restore-btn').classList.toggle('hidden', !drawer.classList.contains('collapsed'));
        }

        function toggleDarkMode(manual = false) {
            const isDark = document.documentElement.classList.toggle("dark");
            if (manual) { localStorage.setItem("THEME_DARK_MODE", isDark ? "true" : "false"); }
            document.getElementById("dark-mode-icon").innerText = isDark ? "light_mode" : "dark_mode";
        }

        function initializeTheme() {
            const isDarkSystem = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem("THEME_DARK_MODE");
            const isDark = savedTheme !== null ? savedTheme === "true" : isDarkSystem;
            document.documentElement.classList.toggle("dark", isDark);
            document.getElementById("dark-mode-icon").innerText = isDark ? "light_mode" : "dark_mode";
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                if (localStorage.getItem("THEME_DARK_MODE") === null) {
                    document.documentElement.classList.toggle("dark", e.matches);
                    document.getElementById("dark-mode-icon").innerText = e.matches ? "light_mode" : "dark_mode";
                }
            });
        }

        function triggerDataExport() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appState, null, 2));
            const anchor = document.createElement('a');
            anchor.setAttribute("href", dataStr);
            anchor.setAttribute("download", `MD3_ATOMIC_DATA.json`);
            anchor.click();
            anchor.remove();
        }

        function triggerDataImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    if (data.batches) {
                        appState = data;
                        saveStateToStorage();
                        renderAllComponents();
                        alert("配置复原成功！");
                    }
                } catch (err) { alert("非法配置文件。"); }
            };
            reader.readAsText(file);
        }

        function renderAllComponents() {
            calculateAndRenderStatistics();
            renderHomeChecklist();
            renderLeftDrawerPool();
            renderSpecialTaskLists();
            renderCalendarWorkspace();
        }
    </script>
</body>

</html>
