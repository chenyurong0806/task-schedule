<!DOCTYPE html>
<html lang="zh-CN" class="transition-colors duration-300">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暑假作业看板</title>
    <meta name="theme-color" content="#6750A4">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        rel="stylesheet" />
    <link rel="icon" type="image/png" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --md-sys-color-primary: #6750A4;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #EADDFF;
            --md-sys-color-on-primary-container: #21005D;
            --md-sys-color-secondary: #625B71;
            --md-sys-color-on-secondary: #FFFFFF;
            --md-sys-color-secondary-container: #E8DEF8;
            --md-sys-color-on-secondary-container: #1D192B;
            --md-sys-color-background: #FEF7FF;
            --md-sys-color-on-background: #1D1B20;
            --md-sys-color-surface: #FEF7FF;
            --md-sys-color-on-surface: #1D1B20;
            --md-sys-color-surface-variant: #E7E0EC;
            --md-sys-color-on-surface-variant: #49454F;
            --md-sys-color-surface-container-lowest: #FFFFFF;
            --md-sys-color-surface-container-low: #F7F2FA;
            --md-sys-color-surface-container: #F3EDF7;
            --md-sys-color-surface-container-high: #ECE6F0;
            --md-sys-color-surface-container-highest: #E6E1E5;
            --md-sys-color-outline: #79747E;
            --md-sys-color-outline-variant: #CAC4D0;
            --md-sys-color-tertiary-container: #FFD8E4;
            --md-motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
            --md-motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);
            --md-motion-duration-short4: 200ms;
            --md-motion-duration-medium1: 250ms;
            --md-motion-duration-long1: 400ms;
        }

        html.dark {
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-on-primary: #381E72;
            --md-sys-color-primary-container: #4F378B;
            --md-sys-color-on-primary-container: #EADDFF;
            --md-sys-color-secondary: #CCC2DC;
            --md-sys-color-on-secondary: #332D41;
            --md-sys-color-secondary-container: #4A4458;
            --md-sys-color-on-secondary-container: #E8DEF8;
            --md-sys-color-background: #141218;
            --md-sys-color-on-background: #E6E1E5;
            --md-sys-color-surface: #141218;
            --md-sys-color-on-surface: #E6E1E5;
            --md-sys-color-surface-variant: #49454F;
            --md-sys-color-on-surface-variant: #CAC4D0;
            --md-sys-color-surface-container-lowest: #0F0D13;
            --md-sys-color-surface-container-low: #1D1B20;
            --md-sys-color-surface-container: #211F26;
            --md-sys-color-surface-container-high: #2B2930;
            --md-sys-color-surface-container-highest: #333138;
            --md-sys-color-outline: #938F99;
            --md-sys-color-outline-variant: #49454F;
        }

        body {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .md-nav-item .md-icon-wrapper {
            transition: background-color var(--md-motion-duration-short4) var(--md-motion-easing-emphasized);
        }

        .md-nav-item.active .md-icon-wrapper {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
            border-radius: 16px;
        }

        .md-ripple {
            position: relative;
            overflow: hidden;
        }

        .md-ripple::after {
            content: "";
            position: absolute;
            inset: 0;
            background-color: currentColor;
            opacity: 0;
            transition: opacity var(--md-motion-duration-short4) linear;
        }

        .md-ripple:hover::after {
            opacity: 0.08;
        }

        .md-ripple:active::after {
            opacity: 0.16;
        }

        #task-drawer {
            transition: transform var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                width var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                opacity var(--md-motion-duration-medium1);
        }

        #task-drawer.collapsed {
            width: 0px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(-100%);
        }

        @media (min-width: 768px) {
            #task-drawer.collapsed {
                transform: none;
            }
        }

        .view-pane {
            opacity: 0;
            transform: translateY(12px);
            transition: opacity var(--md-motion-duration-long1) var(--md-motion-easing-emphasized),
                transform var(--md-motion-duration-long1) var(--md-motion-easing-emphasized);
            pointer-events: none;
            position: absolute;
            inset: 0;
        }

        .view-pane.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            position: relative;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
        }

        .calendar-grid-month {
            grid-template-rows: auto repeat(6, minmax(0, 1fr));
        }

        .calendar-grid-week {
            grid-template-rows: auto 1fr;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom MD3 Scrollbar */
        .md-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .md-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .md-scrollbar::-webkit-scrollbar-thumb {
            background: var(--md-sys-color-outline-variant);
            border-radius: 8px;
        }

        .md-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--md-sys-color-outline);
        }

        .md-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: var(--md-sys-color-outline-variant) transparent;
        }

        .chip-active {
            background-color: var(--md-sys-color-secondary-container) !important;
            color: var(--md-sys-color-on-secondary-container) !important;
            border-color: transparent !important;
        }

        .drag-hover {
            background-color: var(--md-sys-color-primary-container) !important;
            opacity: 0.85;
            transform: scale(1.02);
            box-shadow: 0 0 0 2px var(--md-sys-color-primary) inset;
            border-radius: 8px;
        }

        .meta-drop-hover {
            background-color: var(--md-sys-color-tertiary-container) !important;
            transform: scale(1.02);
            border: 1px dashed var(--md-sys-color-primary) !important;
            z-index: 10;
            position: relative;
        }

        .timeline-track-container {
            position: relative;
            height: 1440px;
        }

        .timeline-hour-row {
            height: 60px;
            border-bottom: 1px dashed var(--md-sys-color-outline-variant);
            position: relative;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 12px;
            cursor: ns-resize;
            background-color: rgba(0, 0, 0, 0.12);
            border-radius: 0 0 8px 8px;
            touch-action: none;
        }

        .resize-handle:hover {
            background-color: rgba(0, 0, 0, 0.3);
        }

        #global-tooltip {
            position: fixed;
            pointer-events: none;
            z-index: 200;
            display: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.15);
            background-color: var(--md-sys-color-surface-container-highest);
            color: var(--md-sys-color-on-surface);
            border-radius: 8px;
            padding: 12px;
            max-width: 280px;
            border: 1px solid var(--md-sys-color-outline-variant);
        }

        .folder-content {
            transition: grid-template-rows var(--md-motion-duration-long1) var(--md-motion-easing-standard);
            display: grid;
            grid-template-rows: 0fr;
        }

        .folder-content.open {
            grid-template-rows: 1fr;
        }

        .folder-inner {
            overflow: hidden;
            min-height: 0;
            padding: 0 !important;
            border: none !important;
        }

        .folder-icon {
            transition: transform var(--md-motion-duration-short4) var(--md-motion-easing-standard);
            transform: rotate(0deg);
        }

        .folder-icon.open {
            transform: rotate(90deg);
        }

        @keyframes locatePulse {
            0% {
                box-shadow: 0 0 0 0 rgba(103, 80, 164, 0.8);
            }

            40% {
                box-shadow: 0 0 0 3px rgba(103, 80, 164, 0.5);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(103, 80, 164, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(103, 80, 164, 0);
            }
        }

        .locate-highlight {
            animation: locatePulse 1s ease-in-out 2;
        }

        /* 3-Pane Slider Elements */
        .slider-viewport {
            overflow: hidden;
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slider-track {
            display: flex;
            width: 300%;
            height: 100%;
            transform: translateX(-33.3333%);
            will-change: transform;
        }

        .slider-pane {
            width: 33.3333%;
            height: 100%;
            flex-shrink: 0;
        }
    </style>
</head>

<body class="h-[100dvh] w-screen flex flex-col md:flex-row select-none overflow-hidden">

    <!-- Global Date Picker - Positioned absolutely near pointer of trigger dynamically -->
    <input type="date" id="global-date-picker" class="fixed w-0 h-0 opacity-0 pointer-events-none z-[9999]"
        onchange="handleDatePickerChange(event)">
    <div id="global-tooltip" class="text-xs flex flex-col gap-1"></div>
    <div id="custom-context-menu" class="fixed hidden z-[100] rounded-lg p-1 shadow-xl border text-xs min-w-[150px]"
        style="background-color: var(--md-sys-color-surface-container-high); border-color: var(--md-sys-color-outline-variant);">
    </div>

    <aside
        class="w-full md:w-20 h-16 md:h-full flex flex-row md:flex-col justify-around md:justify-between items-center py-2 md:py-6 flex-shrink-0 order-last md:order-first border-t md:border-t-0 md:border-r z-50 bg-[var(--md-sys-color-surface-container-low)] border-[var(--md-sys-color-outline-variant)] overflow-x-auto no-scrollbar">
        <div class="flex flex-row md:flex-col items-center gap-2 md:gap-5 px-4 md:px-0 w-full md:w-auto">
            <div
                class="hidden md:flex w-12 h-12 rounded-full items-center justify-center text-[var(--md-sys-color-primary)]">
                <span class="material-symbols-outlined text-[32px] font-bold">spellcheck</span>
            </div>
            <nav class="flex flex-row md:flex-col gap-2 md:gap-4 flex-1 md:w-full md:px-2">
                <button onclick="switchView('home')" id="nav-home"
                    class="md-nav-item active flex flex-col items-center gap-1 group md:w-full text-center outline-none px-3 md:px-0">
                    <div class="md-icon-wrapper w-14 h-8 flex items-center justify-center rounded-full"><span
                            class="material-symbols-outlined">home</span></div>
                    <span class="text-[10px] md:text-xs font-medium tracking-wider">首页</span>
                </button>
                <button onclick="switchView('today')" id="nav-today"
                    class="md-nav-item flex flex-col items-center gap-1 group md:w-full text-center outline-none px-3 md:px-0">
                    <div class="md-icon-wrapper w-14 h-8 flex items-center justify-center rounded-full"><span
                            class="material-symbols-outlined">today</span></div>
                    <span class="text-[10px] md:text-xs font-medium tracking-wider">今日</span>
                </button>
                <button onclick="switchView('calendar')" id="nav-calendar"
                    class="md-nav-item flex flex-col items-center gap-1 group md:w-full text-center outline-none px-3 md:px-0">
                    <div class="md-icon-wrapper w-14 h-8 flex items-center justify-center rounded-full"><span
                            class="material-symbols-outlined">calendar_month</span></div>
                    <span class="text-[10px] md:text-xs font-medium tracking-wider">日程</span>
                </button>
            </nav>
            <hr class="hidden md:block w-8 border-[var(--md-sys-color-outline-variant)]">
            <div class="flex flex-row md:flex-col gap-1 md:gap-3">
                <button onclick="toggleDarkMode(true)"
                    class="w-10 h-10 rounded-full flex items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="切换深色模式">
                    <span class="material-symbols-outlined" id="dark-mode-icon">dark_mode</span>
                </button>
                <button onclick="triggerDataExport()"
                    class="hidden md:flex w-10 h-10 rounded-full items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="导出配置">
                    <span class="material-symbols-outlined">download</span>
                </button>
                <button onclick="document.getElementById('import-file-input').click()"
                    class="hidden md:flex w-10 h-10 rounded-full items-center justify-center md-ripple text-[var(--md-sys-color-on-surface-variant)]"
                    title="导入配置">
                    <span class="material-symbols-outlined">upload</span>
                </button>
                <input type="file" id="import-file-input" class="hidden" accept=".json"
                    onchange="triggerDataImport(event)">
            </div>
        </div>
        <button onclick="openAddTaskModal()"
            class="md-ripple w-12 h-12 md:w-14 md:h-14 rounded-xl md:rounded-2xl flex items-center justify-center shadow-lg transition-transform active:scale-95 flex-shrink-0 mr-4 md:mr-0"
            style="background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);">
            <span class="material-symbols-outlined text-[24px] md:text-[28px]">add</span>
        </button>
    </aside>

    <section id="task-drawer"
        class="absolute md:relative z-40 h-[calc(100%-4rem)] md:h-full w-80 max-w-[85vw] flex flex-col border-r flex-shrink-0 transition-all duration-300 shadow-2xl md:shadow-none"
        style="background-color: var(--md-sys-color-surface-container-lowest); border-color: var(--md-sys-color-outline-variant);"
        ondragover="allowDrop(event)" ondragleave="handleDragLeave(event)">

        <div class="p-4 flex flex-col gap-3 border-b flex-shrink-0"
            style="border-color: var(--md-sys-color-outline-variant);">
            <div class="flex items-center justify-between">
                <h2 class="text-sm font-semibold tracking-wide" style="color: var(--md-sys-color-on-surface-variant);">
                    索引</h2>
                <button onclick="toggleDrawer()"
                    class="w-8 h-8 rounded-full flex items-center justify-center md-ripple hover:bg-black/5 dark:hover:bg-white/5">
                    <span class="material-symbols-outlined text-xl">menu_open</span>
                </button>
            </div>

            <div class="relative w-full">
                <div
                    class="flex items-center bg-[var(--md-sys-color-surface-container-high)] rounded-full px-3 py-1.5 border border-[var(--md-sys-color-outline-variant)] focus-within:border-[var(--md-sys-color-primary)] transition-colors">
                    <span
                        class="material-symbols-outlined text-[16px] text-[var(--md-sys-color-on-surface-variant)]">search</span>
                    <input type="text" id="drawer-search-input" oninput="handleDrawerSearch(this.value)"
                        placeholder="搜索关键词（例如：数学 函数）"
                        class="bg-transparent flex-1 outline-none text-xs ml-2 text-[var(--md-sys-color-on-surface)]" />
                    <span id="drawer-search-count"
                        class="text-[10px] text-[var(--md-sys-color-primary)] font-bold ml-2"></span>
                </div>
                <div id="drawer-search-results"
                    class="absolute left-0 right-0 top-full mt-2 bg-[var(--md-sys-color-surface-container-highest)] border border-[var(--md-sys-color-outline-variant)] rounded-xl shadow-lg z-[60] hidden flex-col max-h-48 overflow-y-auto md-scrollbar">
                </div>
            </div>

            <div class="flex items-center gap-1 overflow-x-auto no-scrollbar py-1" id="drawer-filter-chips">
                <button onclick="changeDrawerArrange('group')" id="chip-group"
                    class="chip-active text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0">默认</button>
                <button onclick="changeDrawerArrange('subject')" id="chip-subject"
                    class="text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0">按学科</button>
                <button onclick="changeDrawerArrange('tag')" id="chip-tag"
                    class="text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0">按标签</button>
                <button onclick="changeDrawerArrange('time')" id="chip-time"
                    class="text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0">按时间</button>
            </div>

            <div id="drawer-quick-add-container" class="gap-1 mt-1 flex items-center" style="display: none;">
                <input type="color" id="drawer-quick-color" value="#6750A4"
                    class="w-6 h-6 p-0 border-0 rounded cursor-pointer hidden flex-shrink-0 bg-transparent" />
                <input type="text" id="drawer-quick-input" placeholder="创建一项..."
                    class="flex-1 text-xs px-2 py-1.5 rounded-lg border outline-none bg-[var(--md-sys-color-surface-container-low)] border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface)] min-w-0" />
                <button onclick="executeQuickMetaAdd()"
                    class="px-2 py-1.5 rounded-lg text-xs font-bold bg-[var(--md-sys-color-primary-container)] text-[var(--md-sys-color-on-primary-container)] md-ripple transition-transform active:scale-95 flex-shrink-0">+</button>
            </div>
        </div>
        <div class="flex-1 overflow-hidden relative flex flex-col">
            <div id="drawer-task-container" class="flex-1 overflow-y-auto p-2 flex flex-col gap-1 md-scrollbar"></div>
            <!-- Quick locate today button -->
            <div id="drawer-today-locator-container"
                class="p-2 border-t border-[var(--md-sys-color-outline-variant)] bg-[var(--md-sys-color-surface-container-lowest)] hidden flex-shrink-0 justify-center">
                <button onclick="locateDrawerToday()"
                    class="w-full py-2 rounded-full text-xs font-bold bg-[var(--md-sys-color-primary)] text-white shadow-md hover:shadow-lg transition-all active:scale-95 flex items-center justify-center gap-1.5 md-ripple">
                    <span class="material-symbols-outlined text-sm">today</span>定位到今天
                </button>
            </div>
        </div>
    </section>

    <button id="drawer-restore-btn" onclick="toggleDrawer()"
        class="hidden fixed left-4 md:left-24 top-4 w-10 h-10 rounded-full shadow-md flex items-center justify-center z-40 md-ripple bg-[var(--md-sys-color-surface-container-high)] border border-[var(--md-sys-color-outline-variant)]">
        <span class="material-symbols-outlined">menu</span>
    </button>

    <main class="flex-1 h-[100dvh] md:h-full relative overflow-hidden flex flex-col">
        <div id="view-home" class="view-pane active p-4 md:p-6 flex flex-col h-full overflow-hidden gap-4 md:gap-6">
            <header
                class="w-full max-w-3xl mx-auto flex items-center h-12 md:h-14 rounded-full px-4 shadow-sm flex-shrink-0 gap-2"
                style="background-color: var(--md-sys-color-surface-container-high);">
                <span class="material-symbols-outlined text-[var(--md-sys-color-on-surface-variant)] mr-1">search</span>
                <input type="text" id="global-search" oninput="handleSearchDebounced(this.value)"
                    placeholder="搜索关键词"
                    class="bg-transparent flex-1 outline-none text-sm text-[var(--md-sys-color-on-surface)]" />
                <button onclick="undo()"
                    class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                        class="material-symbols-outlined text-lg">undo</span></button>
                <button onclick="redo()"
                    class="p-1 rounded-full hover:bg-black/5 dark:hover:bg-white/5 text-[var(--md-sys-color-on-surface-variant)] transition-colors"><span
                        class="material-symbols-outlined text-lg">redo</span></button>
            </header>
            <div class="p-4 md:p-5 rounded-2xl flex flex-col gap-3 shadow-sm border border-[var(--md-sys-color-outline-variant)] flex-shrink-0"
                style="background-color: var(--md-sys-color-surface-container-low);">
                <div class="flex justify-between items-center">
                    <div>
                        <h3 class="text-sm md:text-base font-bold tracking-tight">总进度</h3>
                        <p class="text-[10px] md:text-xs text-[var(--md-sys-color-on-surface-variant)]"
                            id="stats-summary-text">计算中...</p>
                    </div>
                    <span class="text-xl md:text-2xl font-black" style="color: var(--md-sys-color-primary);"
                        id="global-progress-percent">0%</span>
                </div>
                <div class="w-full h-2 md:h-3 rounded-full overflow-hidden"
                    style="background-color: var(--md-sys-color-surface-variant);">
                    <div id="global-progress-bar" class="h-full rounded-full transition-all duration-700 ease-out"
                        style="width: 0%; background-color: var(--md-sys-color-primary);"></div>
                </div>
            </div>
            <div class="flex-1 w-full flex flex-col gap-4 md:gap-6 overflow-hidden min-h-0">
                <div
                    class="flex-1 w-full flex flex-col gap-3 overflow-y-auto pr-1 md:pr-2 md-scrollbar min-h-0 animate-fade">
                    <div id="home-checklist-container" class="flex flex-col gap-4 pb-6 md:pb-12"></div>
                </div>
            </div>
        </div>

        <div id="view-today" class="view-pane p-4 md:p-6 flex flex-col h-full overflow-hidden gap-4 md:gap-6">
            <div class="flex items-center gap-3 flex-shrink-0">
                <span
                    class="material-symbols-outlined text-2xl md:text-3xl text-[var(--md-sys-color-primary)]">today</span>
                <div>
                    <h2 class="text-lg md:text-xl font-bold tracking-tight">今日概览</h2>
                    <p class="text-xs text-[var(--md-sys-color-on-surface-variant)]" id="today-date-display"></p>
                </div>
            </div>
            <div class="p-4 rounded-2xl flex flex-col gap-3 bg-rose-100/40 dark:bg-rose-950/20 border border-rose-300/60 shadow-sm flex-shrink-0"
                ondragover="allowDropToday(event)" ondrop="dropToTodayArea(event)">

    <script>
        const getRealTodayStr = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().split('T')[0];
        };
        const TODAY_STR = getRealTodayStr();

        const defaultInitialState = {
            batches: [{
                id: "batch-demo-01",
                title: "高一物理必修第一册错题回溯",
                content: "对期末考卷中动力学多体滑块模型与牛顿第二定律综合题重新推导。",
                subject: "物理",
                tags: ["高难度", "急需突破"],
                subtasks: [{
                    id: "sub-101",
                    text: "滑块模型核心三题拆解",
                    weight: 1,
                    done: true,
                    completedAt: TODAY_STR,
                    endDate: TODAY_STR,
                    startMinute: 480,
                    durationMinutes: 90
                },
                {
                    id: "sub-102",
                    text: "建立隔离法受力方程组",
                    weight: 1,
                    done: false,
                    endDate: TODAY_STR,
                    startMinute: 540,
                    durationMinutes: 120
                }
                ]
            }, {
                id: "batch-demo-02",
                title: "英语3500词高效循环背诵",
                content: "复习并默写核心变形词及短语。",
                subject: "英语",
                tags: ["高频高燃"],
                subtasks: [{
                    id: "sub-201",
                    text: "Unit 1 核心词默写",
                    weight: 1,
                    done: true,
                    completedAt: TODAY_STR,
                    endDate: TODAY_STR,
                    startMinute: 780,
                    durationMinutes: 180
                },
                {
                    id: "sub-202",
                    text: "Unit 2 完形填空精讲",
                    weight: 1,
                    done: false,
                    endDate: null,
                    startMinute: null,
                    durationMinutes: 120
                }
                ]
            }],
            tags: [{ name: "高难度", color: "#E53935" }, { name: "急需突破", color: "#FB8C00" }, { name: "高频高燃", color: "#3949AB" }],
            subjects: ["语文", "数学", "英语", "物理", "化学", "地理"],
            currentDrawerArrange: "group",
            searchQuery: "",
            selectedFormSubject: "数学",
            selectedFormTags: [],
            calendarYear: parseInt(TODAY_STR.split('-')[0]),
            calendarMonth: parseInt(TODAY_STR.split('-')[1]),
            calendarMode: "month",
            focusedDate: TODAY_STR
        };

        let appState = {};
        let historyStack = [];
        let historyIndex = -1;
        let isRestoring = false;
        let searchDebounceTimer = null;
        let drawerSearchTimer = null;
        let timelineInteractionCtx = { type: null, subtaskId: null, initialY: 0, initialStartMinute: 0, initialDuration: 0 };
        let timelineLayoutCache = {};
        let contextMenuCtx = { type: null, arg1: null, arg2: null, arg3: null };
        let isGlobalDragging = false;
        let globalDraggedSubtaskId = null;
        let dragHoverNavTimer = null;
        let isTouch = false;
        let currentDatePickerSubtaskId = null;
        let drawerFolderStates = {};
        let lastClickX = 0;
        let lastClickY = 0;

        const subjectColors = {
            "语文": { bg: "#F3E5F5", text: "#4A148C" },
            "数学": { bg: "#E3F2FD", text: "#0D47A1" },
            "英语": { bg: "#E1F5FE", text: "#01579B" },
            "物理": { bg: "#E8EAF6", text: "#1A237E" },
            "化学": { bg: "#E0F2F1", text: "#004D40" },
            "地理": { bg: "#EFEBE9", text: "#4E342E" }
        };

        const SUPABASE_URL = 'https://mamubvgmcetepllznifl.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_HEeNPSqD75cWlnmZjcVHKA_Pw-OdL_A';
        const BUCKET_NAME = 'schedule-data';
        const FILE_NAME = 'data.json';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function loadStateFromSupabase() {
            try {
                const { data, error } = await supabaseClient.storage.from(BUCKET_NAME).download(FILE_NAME);
                if (error) throw error;
                const text = await data.text();
                const parsed = JSON.parse(text);
                localStorage.setItem("MD3_ATOMIC_SYSTEM_DATA", JSON.stringify(parsed));
                return parsed;
            } catch (err) {
                const cached = localStorage.getItem("MD3_ATOMIC_SYSTEM_DATA");
                if (cached) { try { return JSON.parse(cached); } catch (e) { } }
                return JSON.parse(JSON.stringify(defaultInitialState));
            }
        }

        function commitState() {
            if (isRestoring) return;
            if (historyIndex < historyStack.length - 1) historyStack = historyStack.slice(0, historyIndex + 1);
            historyStack.push(JSON.parse(JSON.stringify(appState)));
            if (historyStack.length > 50) historyStack.shift();
            else historyIndex++;
        }

        // Action History
        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                isRestoring = true;
                appState = JSON.parse(JSON.stringify(historyStack[historyIndex]));
                saveStateToStorage(false);
                renderAllComponents();
                isRestoring = false;
            }
        }

        function redo() {
            if (historyIndex < historyStack.length - 1) {
                historyIndex++;
                isRestoring = true;
                appState = JSON.parse(JSON.stringify(historyStack[historyIndex]));
                saveStateToStorage(false);
                renderAllComponents();
                isRestoring = false;
            }
        }

        function saveStateToStorage(pushHistory = true) {
            if (pushHistory) commitState();
            localStorage.setItem("MD3_ATOMIC_SYSTEM_DATA", JSON.stringify(appState));
            supabaseClient.storage.from(BUCKET_NAME).upload(FILE_NAME, JSON.stringify(appState), {
                upsert: true,
                contentType: 'application/json'
            }).catch(() => { });
        }

        document.addEventListener("DOMContentLoaded", async () => {
            appState = await loadStateFromSupabase();
            appState.searchQuery = "";
            commitState();
            initializeTheme();
            setupDragHoverNavigation();
            renderAllComponents();
            document.getElementById("today-date-display").innerText = TODAY_STR;

            document.addEventListener("mousedown", (e) => {
                lastClickX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
                lastClickY = e.clientY || (e.touches && e.touches[0].clientY) || 0;
            }, { passive: true });

            document.addEventListener("touchstart", (e) => {
                lastClickX = e.touches[0].clientX || 0;
                lastClickY = e.touches[0].clientY || 0;
            }, { passive: true });

            document.addEventListener("click", (e) => {
                document.getElementById("custom-context-menu").style.display = "none";
                if (!e.target.closest('#drawer-search-results') && e.target.id !== 'drawer-search-input') {
                    const res = document.getElementById('drawer-search-results');
                    if (res) {
                        res.classList.add('hidden');
                        res.classList.remove('flex');
                    }
                }
            });
            document.addEventListener("dragstart", () => {
                isGlobalDragging = true;
                hideGlobalTooltip();
            });
            document.addEventListener("dragend", () => {
                isGlobalDragging = false;
                globalDraggedSubtaskId = null;
                clearTimeout(dragHoverNavTimer);
            });
            document.addEventListener("drop", () => {
                isGlobalDragging = false;
                globalDraggedSubtaskId = null;
                clearTimeout(dragHoverNavTimer);
            });

            window.addEventListener('touchstart', () => isTouch = true, { passive: true });

            document.addEventListener('keydown', e => {
                if (e.ctrlKey || e.metaKey) {
                    if (e.key === 'z') { e.preventDefault(); undo(); }
                    if (e.key === 'y') { e.preventDefault(); redo(); }
                }
            });
        });

        // Hover Sidebar Navigation while dragging tasks
        function setupDragHoverNavigation() {
            const sidebarNavIds = ['nav-home', 'nav-today', 'nav-calendar'];
            sidebarNavIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('dragover', (e) => {
                        e.preventDefault();
                        if (isGlobalDragging) {
                            if (!el.dataset.dragOverActive) {
                                el.dataset.dragOverActive = "true";
                                clearTimeout(dragHoverNavTimer);
                                dragHoverNavTimer = setTimeout(() => {
                                    const viewName = id.replace('nav-', '');
                                    switchView(viewName);
                                }, 800);
                            }
                        }
                    });
                    el.addEventListener('dragleave', () => {
                        el.removeAttribute('data-drag-over-active');
                        clearTimeout(dragHoverNavTimer);
                    });
                    el.addEventListener('drop', () => {
                        el.removeAttribute('data-drag-over-active');
                        clearTimeout(dragHoverNavTimer);
                    });
                }
            });
        }

        function findSubtask(subtaskId) {
            for (let b of appState.batches) {
                let s = b.subtasks.find(x => x.id === subtaskId);
                if (s) return { batch: b, subtask: s };
            }
            return null;
        }

        function openDatePicker(subtaskId, event) {
            currentDatePickerSubtaskId = subtaskId;
            const task = findSubtask(subtaskId);
            const picker = document.getElementById('global-date-picker');
            picker.value = task.subtask.endDate || '';

            // Re-anchor date picker element immediately to viewport coordinate of the click to prevent top-left jumping
            const x = event ? event.clientX : lastClickX;
            const y = event ? event.clientY : lastClickY;
            picker.style.left = (x || 100) + 'px';
            picker.style.top = (y || 100) + 'px';

            try {
                picker.showPicker();
            } catch (e) {
                picker.focus();
                picker.click();
            }
        }

        function handleDatePickerChange(e) {
            if (!currentDatePickerSubtaskId) return;
            const val = e.target.value;
            const task = findSubtask(currentDatePickerSubtaskId);
            if (task) {
                task.subtask.endDate = val || null;
                saveStateToStorage();
                renderAllComponents();
            }
            currentDatePickerSubtaskId = null;
        }

        function jumpToCalendar(dateStr) {
            if (!dateStr || dateStr === '待分发' || dateStr === 'null') return;
            appState.focusedDate = dateStr;
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return;
            appState.calendarYear = d.getFullYear();
            appState.calendarMonth = d.getMonth() + 1;
            switchCalendarMode('month');
            switchView('calendar');
            setTimeout(() => {
                const cells = document.querySelectorAll('#month-grid-container > div');
                cells.forEach(el => {
                    if (el.dataset.date === dateStr) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('locate-highlight');
                        setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                    }
                });
            }, 300);
        }

        function syncDrawerLocation(subtaskId) {
            const drawer = document.getElementById('task-drawer');
            if (!drawer.classList.contains('collapsed')) {
                expandToDrawerTask(subtaskId);
            }
        }

        function determineBestArrange(batch, subtask, keyword) {
            const kw = keyword.toLowerCase();
            if (batch.subject.toLowerCase().includes(kw)) return 'subject';
            if (batch.tags.some(t => t.toLowerCase().includes(kw))) return 'tag';
            if (subtask.endDate && subtask.endDate.includes(kw)) return 'time';
            return 'group';
        }

        function expandToDrawerTask(subtaskId, keyword = '') {
            const target = findSubtask(subtaskId);
            let targetMode = 'time';
            if (target && keyword) {
                targetMode = determineBestArrange(target.batch, target.subtask, keyword);
            }
            changeDrawerArrange(targetMode);
            const drawer = document.getElementById('task-drawer');
            drawer.classList.remove('collapsed');
            document.getElementById('drawer-restore-btn').classList.add('hidden');

            setTimeout(() => {
                const el = document.querySelector(`#drawer-task-container [data-subtask-id="${subtaskId}"]`);
                if (el) {
                    let parent = el.parentElement;
                    while (parent && parent.id !== 'drawer-task-container') {
                        if (parent.classList.contains('folder-content')) {
                            parent.classList.add('open');
                            const header = parent.previousElementSibling;
                            if (header) {
                                const icon = header.querySelector('.folder-icon');
                                if (icon) icon.classList.add('open');
                                const folderId = header.getAttribute('data-folder-id');
                                if (folderId) drawerFolderStates[folderId] = true;
                            }
                        }
                        parent = parent.parentElement;
                    }
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('locate-highlight');
                    setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                }
            }, 100);
        }

        function allowDrop(e) { e.preventDefault(); }
        function handleDragLeave(e) { e.currentTarget.classList.remove("drag-hover", "meta-drop-hover"); }

        function handleSubtaskDragStart(e, subtaskId) {
            e.dataTransfer.setData("text/plain", subtaskId);
            e.dataTransfer.effectAllowed = "move";
            isGlobalDragging = true;
            globalDraggedSubtaskId = subtaskId;
            hideGlobalTooltip();
            document.getElementById("custom-context-menu").style.display = "none";

            // Instantly collapse parent folder containing the task being dragged
            const taskEl = document.querySelector(`[data-subtask-id="${subtaskId}"]`);
            if (taskEl) {
                let parent = taskEl.parentElement;
                while (parent && parent.id !== 'drawer-task-container') {
                    if (parent.classList.contains('folder-content')) {
                        parent.classList.remove('open');
                        const header = parent.previousElementSibling;
                        if (header) {
                            const icon = header.querySelector('.folder-icon');
                            if (icon) icon.classList.remove('open');
                            const folderId = header.getAttribute('data-folder-id');
                            if (folderId) drawerFolderStates[folderId] = false;
                        }
                    }
                    parent = parent.parentElement;
                }
            }
        }

        function dropToCalendarCell(e, dateStr, cellEl) {
            e.preventDefault();
            cellEl.classList.remove("drag-hover");
            const subtaskId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
            const target = findSubtask(subtaskId);
            if (target) {
                target.subtask.endDate = dateStr;
                saveStateToStorage();
                renderAllComponents();
                if (appState.calendarMode === 'week') focusDayTimeline(appState.focusedDate);
            }
            isGlobalDragging = false;
        }

        function dropToTimelineTrack(e) {
            e.preventDefault();
            const subtaskId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
            const target = findSubtask(subtaskId);
            if (!target) return;
            const rect = document.getElementById("timeline-track-wrapper").getBoundingClientRect();
            const dropY = (e.clientY || (e.changedTouches && e.changedTouches[0].clientY)) - rect.top;
            let targetMinute = Math.round(dropY / 10) * 10;
            targetMinute = Math.max(0, Math.min(1440 - target.subtask.durationMinutes, targetMinute));
            target.subtask.endDate = appState.focusedDate;
            target.subtask.startMinute = targetMinute;
            saveStateToStorage();
            renderAllComponents();
            focusDayTimeline(appState.focusedDate);
            isGlobalDragging = false;
        }

        // Support dragging tasks directly to "今日任务/今日概览" columns
        function allowDropToday(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        }

        function dropToTodayArea(e) {
            e.preventDefault();
            const subtaskId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
            const target = findSubtask(subtaskId);
            if (target) {
                target.subtask.endDate = TODAY_STR;
                saveStateToStorage();
                renderAllComponents();
            }
            isGlobalDragging = false;
        }

        function startTimelineCardDrag(e, subtaskId) {
            e.stopPropagation();
            if (e.type !== 'touchstart') e.preventDefault();
            timelineInteractionCtx.type = 'drag';
            timelineInteractionCtx.subtaskId = subtaskId;
            timelineInteractionCtx.initialY = e.clientY || (e.touches && e.touches[0].clientY);
            const target = findSubtask(subtaskId);
            timelineInteractionCtx.initialStartMinute = target.subtask.startMinute;
            isGlobalDragging = true;
            hideGlobalTooltip();
            window.addEventListener("mousemove", doTimelineResizeOrDrag);
            window.addEventListener("mouseup", stopTimelineResizeOrDrag);
            window.addEventListener("touchmove", doTimelineResizeOrDrag, { passive: false });
            window.addEventListener("touchend", stopTimelineResizeOrDrag);
        }

        function startTimelineResize(e, subtaskId) {
            e.stopPropagation();
            if (e.type !== 'touchstart') e.preventDefault();
            timelineInteractionCtx.type = 'resize';
            timelineInteractionCtx.subtaskId = subtaskId;
            timelineInteractionCtx.initialY = e.clientY || (e.touches && e.touches[0].clientY);
            const target = findSubtask(subtaskId);
            timelineInteractionCtx.initialDuration = target.subtask.durationMinutes;
            isGlobalDragging = true;
            hideGlobalTooltip();
            window.addEventListener("mousemove", doTimelineResizeOrDrag);
            window.addEventListener("mouseup", stopTimelineResizeOrDrag);
            window.addEventListener("touchmove", doTimelineResizeOrDrag, { passive: false });
            window.addEventListener("touchend", stopTimelineResizeOrDrag);
        }

        function doTimelineResizeOrDrag(e) {
            if (!timelineInteractionCtx.type) return;
            if (e.type === 'touchmove') e.preventDefault();
            const currentY = e.clientY || (e.touches && e.touches[0].clientY);
            const deltaY = currentY - timelineInteractionCtx.initialY;
            const minuteDelta = Math.round(deltaY / 10) * 10;
            const target = findSubtask(timelineInteractionCtx.subtaskId);
            if (!target) return;
            if (timelineInteractionCtx.type === 'resize') {
                let newDur = timelineInteractionCtx.initialDuration + minuteDelta;
                target.subtask.durationMinutes = Math.max(10, Math.min(1440 - target.subtask.startMinute, newDur));
            } else if (timelineInteractionCtx.type === 'drag') {
                let newStart = timelineInteractionCtx.initialStartMinute + minuteDelta;
                target.subtask.startMinute = Math.max(0, Math.min(1440 - target.subtask.durationMinutes, newStart));
            }
            focusDayTimeline(appState.focusedDate);
        }

        function stopTimelineResizeOrDrag() {
            if (timelineInteractionCtx.type) {
                timelineInteractionCtx.type = null;
                timelineInteractionCtx.subtaskId = null;
                window.removeEventListener("mousemove", doTimelineResizeOrDrag);
                window.removeEventListener("mouseup", stopTimelineResizeOrDrag);
                window.removeEventListener("touchmove", doTimelineResizeOrDrag);
                window.removeEventListener("touchend", stopTimelineResizeOrDrag);
                isGlobalDragging = false;
                saveStateToStorage();
                renderAllComponents();
            }
        }

        function showGlobalTooltip(e, subtaskId) {
            if (isGlobalDragging || isTouch) return;
            const target = findSubtask(subtaskId);
            if (!target) return;
            const tooltip = document.getElementById("global-tooltip");
            let startM_v = target.subtask.startMinute || 480;
            let startH = String(Math.floor(startM_v / 60)).padStart(2, '0');
            let startM = String(startM_v % 60).padStart(2, '0');
            let endTotal = startM_v + target.subtask.durationMinutes;
            let endH = String(Math.floor(endTotal / 60)).padStart(2, '0');
            let endM = String(endTotal % 60).padStart(2, '0');
            tooltip.innerHTML = `
                <div class="font-bold text-[var(--md-sys-color-primary)] text-sm mb-1">${target.subtask.text}</div>
                <div class="text-[var(--md-sys-color-on-surface-variant)] font-medium">属: ${target.batch.title}</div>
                <div class="mt-1.5 flex gap-2"><span class="px-1.5 py-0.5 bg-black/5 dark:bg-white/10 rounded border border-[var(--md-sys-color-outline-variant)]">科: ${target.batch.subject}</span></div>
                <div class="text-[var(--md-sys-color-outline)] font-mono mt-1.5">排程: ${target.subtask.startMinute === null ? '未分配时间' : `${startH}:${startM} - ${endH}:${endM} (${target.subtask.durationMinutes}分)`}</div>
            `;
            tooltip.style.display = "block";
            tooltip.style.left = `${(e.clientX || (e.touches && e.touches[0].clientX)) + 14}px`;
            tooltip.style.top = `${(e.clientY || (e.touches && e.touches[0].clientY)) + 14}px`;
        }

        function hideGlobalTooltip() { document.getElementById("global-tooltip").style.display = "none"; }

        function handleContextMenu(e, type, arg1, arg2, arg3) {
            e.preventDefault();
            e.stopPropagation();
            hideGlobalTooltip();
            contextMenuCtx = { type, arg1, arg2, arg3 };
            const menu = document.getElementById("custom-context-menu");
            let html = '';

            if (type === 'task_home' || type === 'task_drawer' || type === 'task_calendar' || type === 'task_today') {
                const subtaskId = arg2;
                const target = findSubtask(subtaskId);

                if (target) {
                    html += `<button onclick="executeContextMenuAction('toggle_status')" class="w-full text-left px-3 py-2 rounded-md ${target.subtask.done ? 'hover:bg-amber-500/10 text-amber-600' : 'hover:bg-emerald-500/10 text-emerald-600'} flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">${target.subtask.done ? 'undo' : 'check_circle'}</span>${target.subtask.done ? '取消完成' : '完成此任务'}</button>`;
