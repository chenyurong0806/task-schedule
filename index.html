                html += `<button onclick="executeContextMenuAction('set_date')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">calendar_today</span>${hasDate ? '更改日期' : '设置日期'}</button>`;

                if (type !== 'task_calendar') {
                    html += `<button onclick="executeContextMenuAction('locate_calendar')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors ${!hasDate ? 'opacity-50 cursor-not-allowed' : ''}" ${!hasDate ? 'disabled' : ''}><span class="material-symbols-outlined text-sm">explore</span>定位到日历</button>`;
                }

                html += `<button onclick="executeContextMenuAction('edit')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">edit</span>编辑主任务</button>`;

                if (type === 'task_calendar') {
                    html += `<button onclick="executeContextMenuAction('unassign')" class="w-full text-left px-3 py-2 rounded-md hover:bg-orange-500/10 text-orange-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">event_busy</span>取消分配</button>`;
                    html += `<button onclick="executeContextMenuAction('unassign_time')" class="w-full text-left px-3 py-2 rounded-md hover:bg-orange-500/10 text-orange-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">timer_off</span>取消具体时间</button>`;
                }
                html += `<hr class="my-1 border-[var(--md-sys-color-outline-variant)]">`;
                html += `<button onclick="executeContextMenuAction('delete_task')" class="w-full text-left px-3 py-2 rounded-md hover:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">delete</span>删除此子任务</button>`;
            } else if (type === 'folder_main') {
                html += `<button onclick="executeContextMenuAction('add_subtask')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">add</span>添加子任务</button>`;
                html += `<button onclick="executeContextMenuAction('delete_main')" class="w-full text-left px-3 py-2 rounded-md hover:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">delete</span>删除主任务</button>`;
            } else if (type === 'folder_subject') {
                html += `<button onclick="executeContextMenuAction('add_subject_task')" class="w-full text-left px-3 py-2 rounded-md hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-2 text-[var(--md-sys-color-on-surface)] transition-colors"><span class="material-symbols-outlined text-sm">add</span>添加 [${arg1}] 任务</button>`;
                html += `<button onclick="executeContextMenuAction('delete_subject')" class="w-full text-left px-3 py-2 rounded-md hover:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">delete</span>删除此学科</button>`;
            } else if (type === 'folder_batch_tag') {
                html += `<button onclick="executeContextMenuAction('remove_tag_from_batch')" class="w-full text-left px-3 py-2 rounded-md hover:bg-orange-500/10 text-orange-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">label_off</span>移除「${arg3}」标签</button>`;
            } else if (type === 'folder_tag') {
                html += `<button onclick="executeContextMenuAction('delete_tag')" class="w-full text-left px-3 py-2 rounded-md hover:bg-red-500/10 dark:hover:bg-red-500/20 text-red-500 flex items-center gap-2 transition-colors"><span class="material-symbols-outlined text-sm">delete</span>删除此标签</button>`;
            }

            menu.innerHTML = html;
            menu.style.display = "block";
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            const menuWidth = 150, menuHeight = menu.offsetHeight || 120;
            if (x + menuWidth > window.innerWidth) x -= menuWidth;
            if (y + menuHeight > window.innerHeight) y -= menuHeight;
            menu.style.left = `${x}px`;
            menu.style.top = `${y}px`;
        }

        function executeContextMenuAction(action) {
            const { type, arg1, arg2, arg3 } = contextMenuCtx;
            if (action === 'locate_calendar') {
                const target = findSubtask(arg2);
                if (!target || !target.subtask.endDate) return;
                jumpToCalendar(target.subtask.endDate);
            } else if (action === 'locate_home') {
                switchView('home');
                setTimeout(() => {
                    const el = document.getElementById('home-sub-' + arg2);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.classList.add('locate-highlight');
                        setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                    }
                }, 300);
            } else if (action === 'toggle_status') {
                toggleSubtaskStatus(arg2);
            } else if (action === 'set_date') {
                openDatePicker(arg2);
            } else if (action === 'edit') { openEditTaskModal(arg1); }
            else if (action === 'unassign') {
                const target = findSubtask(arg2);
                if (target) {
                    target.subtask.endDate = null;
                    saveStateToStorage();
                    renderAllComponents();
                }
            } else if (action === 'unassign_time') {
                const target = findSubtask(arg2);
                if (target) {
                    target.subtask.startMinute = null;
                    saveStateToStorage();
                    renderAllComponents();
                    if (appState.calendarMode === 'week') focusDayTimeline(appState.focusedDate);
                }
            } else if (action === 'delete_task') {
                const b = appState.batches.find(x => x.id === arg1);
                if (b) {
                    b.subtasks = b.subtasks.filter(s => s.id !== arg2);
                    saveStateToStorage();
                    renderAllComponents();
                }
            } else if (action === 'add_subtask') {
                openEditTaskModal(arg1);
                addChecklistItemSlot();
                setTimeout(() => {
                    const s = document.getElementById("form-checklist-slots");
                    s.parentElement.scrollTop = s.parentElement.scrollHeight;
                }, 50);
            } else if (action === 'delete_main') {
                appState.batches = appState.batches.filter(b => b.id !== id);
                saveStateToStorage();
                renderAllComponents();
            } else if (action === 'add_subject_task') {
                openAddTaskModal();
                selectFormSubject(arg1);
            } else if (action === 'delete_subject') {
                appState.subjects = appState.subjects.filter(s => s !== arg1);
                saveStateToStorage();
                renderAllComponents();
            } else if (action === 'remove_tag_from_batch') {
                const b = appState.batches.find(x => x.id === arg1);
                if (b) {
                    b.tags = b.tags.filter(t => t !== arg3);
                    saveStateToStorage();
                    renderAllComponents();
                }
            } else if (action === 'delete_tag') {
                deleteMetaAsset('tag', arg1);
            }
        }

        function executeContextMenuActionObj(type, arg1, arg2, action) {
            contextMenuCtx = { type, arg1, arg2, arg3: null };
            executeContextMenuAction(action);
        }

        // Global deep search supporting multiple criteria
        function handleDrawerSearch(val) {
            clearTimeout(drawerSearchTimer);
            drawerSearchTimer = setTimeout(() => {
                const query = val.trim().toLowerCase();
                const resultsContainer = document.getElementById('drawer-search-results');
                const countContainer = document.getElementById('drawer-search-count');
                if (!query) {
                    resultsContainer.classList.add('hidden');
                    countContainer.innerText = '';
                    return;
                }
                const keywords = query.split(/\s+/).filter(k => k);
                let results = [];
                appState.batches.forEach(b => {
                    b.subtasks.forEach(s => {
                        const tagsStr = b.tags.join(' ');
                        const dateStr = s.endDate || '待排程';
                        const textToSearch = (b.title + ' ' + b.content + ' ' + b.subject + ' ' + s.text + ' ' + tagsStr + ' ' + dateStr).toLowerCase();
                        if (keywords.every(k => textToSearch.includes(k))) {
                            results.push({ batch: b, subtask: s, matchedKeyword: keywords[0] });
                        }
                    });
                });
                countContainer.innerText = results.length;
                if (results.length > 0) {
                    resultsContainer.innerHTML = results.map(r => `
                        <div class="p-2.5 border-b border-[var(--md-sys-color-outline-variant)] last:border-0 cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 transition-colors" onclick="locateDrawerSearchResult('${r.subtask.id}', '${r.matchedKeyword}')">
                            <div class="text-[10px] font-bold text-[var(--md-sys-color-primary)] flex items-center justify-between">
                                <span>${r.batch.title}</span>
                                <span class="opacity-70 font-mono text-[9px]">${r.subtask.endDate || '未分配'}</span>
                            </div>
                            <div class="text-xs text-[var(--md-sys-color-on-surface)] truncate mt-0.5">${r.subtask.text}</div>
                        </div>
                    `).join('');
                    resultsContainer.classList.remove('hidden');
                    resultsContainer.classList.add('flex');
                } else {
                    resultsContainer.classList.add('hidden');
                    resultsContainer.classList.remove('flex');
                }
            }, 200);
        }

        function locateDrawerSearchResult(subtaskId, keyword) {
            document.getElementById('drawer-search-input').value = '';
            document.getElementById('drawer-search-results').classList.add('hidden');
            document.getElementById('drawer-search-count').innerText = '';

            // Switch to default classification (group) first, then expand/locate as requested
            changeDrawerArrange('group');

            const drawer = document.getElementById('task-drawer');
            drawer.classList.remove('collapsed');
            document.getElementById('drawer-restore-btn').classList.add('hidden');

            setTimeout(() => {
                const el = document.querySelector(`#drawer-task-container [data-subtask-id="${subtaskId}"]`);
                if (el) {
                    let parent = el.parentElement;
                    while (parent && parent.id !== 'drawer-task-container') {
                        if (parent.classList.contains('folder-content')) {
                            parent.classList.add('open');
                            const header = parent.previousElementSibling;
                            if (header) {
                                const icon = header.querySelector('.folder-icon');
                                if (icon) icon.classList.add('open');
                                const folderId = header.getAttribute('data-folder-id');
                                if (folderId) drawerFolderStates[folderId] = true;
                            }
                        }
                        parent = parent.parentElement;
                    }
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.classList.add('locate-highlight');
                    setTimeout(() => el.classList.remove('locate-highlight'), 2000);
                }
            }, 100);
        }

        function executeQuickMetaAdd() {
            const input = document.getElementById("drawer-quick-input");
            const value = input.value.trim();
            if (!value) return;
            const currentMode = appState.currentDrawerArrange;
            if (currentMode === 'subject' && !appState.subjects.includes(value)) appState.subjects.push(value);
            else if (currentMode === 'tag' && !appState.tags.some(t => t.name === value)) {
                const color = document.getElementById("drawer-quick-color").value;
                appState.tags.push({ name: value, color: color });
            }
            input.value = "";
            saveStateToStorage();
            renderAllComponents();
        }

        function checkDragCompatibility(subtaskId, targetArrange, dropValue) {
            if (!subtaskId) return true;
            const task = findSubtask(subtaskId);
            if (!task) return true;
            if (targetArrange === 'group') {
                // Must be belonging to the same master batch
                return task.batch.title === dropValue;
            }
            if (targetArrange === 'subject') {
                // Must be belonging to the same subject batch
                return task.batch.subject === dropValue;
            }
            return true;
        }

        function dropToMetaCategory(e, dimension, value, element) {
            e.preventDefault();
            element.classList.remove("meta-drop-hover");
            const subtaskId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
            if (!subtaskId) return;

            const isComp = checkDragCompatibility(subtaskId, dimension, value);
            if (!isComp) {
                isGlobalDragging = false;
                return;
            }

            const target = findSubtask(subtaskId);
            if (!target) return;

            if (dimension === 'tag') {
                if (!target.batch.tags.includes(value)) {
                    target.batch.tags.push(value);
                }
            } else if (dimension === 'time') {
                if (value === '待排程') { target.subtask.endDate = null; }
                else if (value && /^\d{4}-\d{2}-\d{2}$/.test(value)) { target.subtask.endDate = value; }
                else { return; }
            }
            saveStateToStorage();
            renderAllComponents();
            isGlobalDragging = false;
        }

        function toggleFolder(el) {
            const content = el.parentElement.querySelector('.folder-content');
            const icon = el.querySelector('.folder-icon');
            const folderId = el.getAttribute('data-folder-id');
            const isNowOpen = content.classList.toggle('open');
            if (icon) icon.classList.toggle('open');
            if (folderId) drawerFolderStates[folderId] = isNowOpen;
        }

        // Collapse sibling folders on drag hover with type-safety check (cursor turns into forbid for non-compatible elements)
        function handleFolderDragOver(e, folderId, folderCategory, dropValue) {
            e.preventDefault();
            const subtaskId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
            if (!subtaskId) return;

            const isComp = checkDragCompatibility(subtaskId, folderCategory, dropValue);
            if (!isComp) {
                e.dataTransfer.dropEffect = 'none'; // Shows "not-allowed" cursor sign dynamically
                return;
            }
            e.dataTransfer.dropEffect = 'move';

            // Collapse siblings
            const selfHeader = document.querySelector(`[data-folder-id="${folderId}"]`);
            if (selfHeader) {
                const parentBox = selfHeader.closest('.target-inner') || document.getElementById('drawer-task-container');
                if (parentBox) {
                    const siblingHeaders = parentBox.querySelectorAll(`:scope > div > .folder-header`);
                    siblingHeaders.forEach(sib => {
                        const sibId = sib.getAttribute('data-folder-id');
                        if (sibId && sibId !== folderId) {
                            const sibContent = sib.parentElement.querySelector('.folder-content');
                            const sibIcon = sib.querySelector('.folder-icon');
                            if (sibContent && sibContent.classList.contains('open')) {
                                sibContent.classList.remove('open');
                                if (sibIcon) sibIcon.classList.remove('open');
                                drawerFolderStates[sibId] = false;
                            }
                        }
                    });
                }
            }
        }

        function locateDrawerToday() {
            const timeTodayId = `time_d_${TODAY_STR}`;
            const targetFolder = document.querySelector(`[data-folder-id="${timeTodayId}"]`);
            if (targetFolder) {
                // Ensure ancestors are expanded
                let parent = targetFolder.parentElement;
                while (parent && parent.id !== 'drawer-task-container') {
                    if (parent.classList.contains('folder-content')) {
                        parent.classList.add('open');
                        const header = parent.previousElementSibling;
                        if (header) {
                            const icon = header.querySelector('.folder-icon');
                            if (icon) icon.classList.add('open');
                            const folderId = header.getAttribute('data-folder-id');
                            if (folderId) drawerFolderStates[folderId] = true;
                        }
                    }
                    parent = parent.parentElement;
                }
                targetFolder.scrollIntoView({ behavior: 'smooth', block: 'center' });
                targetFolder.classList.add('locate-highlight');
                setTimeout(() => targetFolder.classList.remove('locate-highlight'), 2000);
            } else {
                alert("今日无安排");
            }
        }

        function renderLeftDrawerPool() {
            const container = document.getElementById("drawer-task-container");
            container.innerHTML = "";
            const currentMode = appState.currentDrawerArrange;

            // Handle bottom locator today button visibility
            const locatorContainer = document.getElementById('drawer-today-locator-container');
            if (currentMode === 'time') {
                locatorContainer.classList.remove('hidden');
                locatorContainer.classList.add('flex');
            } else {
                locatorContainer.classList.remove('flex');
                locatorContainer.classList.add('hidden');
            }

            // Standard folders have no color gradients now, keeping a uniform high-end MD3 style
            function createFolderDom(title, dropValue = null, contextMenuAttr = '', extraHtml = '', iconColor = 'var(--md-sys-color-primary)', folderId = '') {
                const wrapper = document.createElement("div");
                wrapper.className = "flex flex-col rounded-xl mb-0.5 transition-colors border border-transparent w-full";
                let counter = 0;
                let dragExpandTimer;

                wrapper.addEventListener("dragenter", (e) => {
                    e.preventDefault(); e.stopPropagation(); counter++;
                    if (counter === 1) {
                        const subId = e.dataTransfer.getData("text/plain") || globalDraggedSubtaskId;
                        const isComp = checkDragCompatibility(subId, currentMode, dropValue);
                        if (isComp && dropValue !== null && dropValue !== 'group_disabled' && dropValue !== 'subject_disabled') {
                            wrapper.classList.add("meta-drop-hover");
                            dragExpandTimer = setTimeout(() => {
                                const content = wrapper.querySelector('.folder-content');
                                if (content) { content.classList.add('open'); drawerFolderStates[folderId] = true; }
                                wrapper.querySelector('.folder-icon')?.classList.add('open');
                            }, 600);
                        }
                    }
                });
                wrapper.addEventListener("dragleave", (e) => {
                    e.stopPropagation(); counter--;
                    if (counter === 0) { wrapper.classList.remove("meta-drop-hover"); clearTimeout(dragExpandTimer); }
                });
                wrapper.addEventListener("dragover", (e) => {
                    handleFolderDragOver(e, folderId, currentMode, dropValue);
                });
                wrapper.addEventListener("drop", (e) => {
                    e.stopPropagation(); counter = 0; wrapper.classList.remove("meta-drop-hover"); clearTimeout(dragExpandTimer);
                    if (dropValue !== null && dropValue !== 'group_disabled' && dropValue !== 'subject_disabled') {
                        dropToMetaCategory(e, currentMode, dropValue, wrapper);
                    }
                });

                const isOpen = drawerFolderStates[folderId];
                wrapper.innerHTML = `
                    <div class="folder-header flex items-center justify-between p-1.5 md:p-2 cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 rounded-lg group select-none transition-colors" onclick="toggleFolder(this)" ${contextMenuAttr} data-folder-id="${folderId}">
                        <div class="flex items-center gap-2 min-w-0" style="color: ${iconColor}">
                            <span class="material-symbols-outlined text-[18px] folder-icon flex-shrink-0 transition-transform ${isOpen ? 'open' : ''}">chevron_right</span>
                            <span class="text-[11px] md:text-xs font-bold truncate">${title}</span>
                        </div>
                        <div class="flex items-center gap-0.5 flex-shrink-0 text-[var(--md-sys-color-on-surface)]">${extraHtml}</div>
                    </div>
                    <!-- Guided lines styled precisely without applying parent opacity to prevent folder content fading -->
                    <div class="folder-content ${isOpen ? 'open' : ''}"><div class="folder-inner"><div class="flex flex-col gap-1 px-1 pb-1 pt-0.5 target-inner" style="margin-left: 14px; border-left: 1px solid var(--md-sys-color-outline-variant); padding-left: 8px;"></div></div></div>
                `;
                return wrapper;
            }

            const standardFolderColor = 'var(--md-sys-color-primary)';

            if (currentMode === 'time') {
                const timeTree = { unassigned: [], years: {} };
                appState.batches.forEach(b => b.subtasks.forEach(s => {
                    if (!s.endDate) timeTree.unassigned.push({ batch: b, subtask: s });
                    else {
                        const d = new Date(s.endDate);
                        if (isNaN(d.getTime())) return;
                        const y = d.getFullYear(), m = d.getMonth() + 1, w = getWeekNumberInMonth(s.endDate);
                        const dayStr = s.endDate, wd = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"][d.getDay()];
                        if (!timeTree.years[y]) timeTree.years[y] = {};
                        if (!timeTree.years[y][m]) timeTree.years[y][m] = {};
                        if (!timeTree.years[y][m][w]) timeTree.years[y][m][w] = {};
                        if (!timeTree.years[y][m][w][dayStr]) timeTree.years[y][m][w][dayStr] = { wd, items: [] };
                        timeTree.years[y][m][w][dayStr].items.push({ batch: b, subtask: s });
                    }
                }));

                if (timeTree.unassigned.length > 0) {
                    const unassignedFolder = createFolderDom(`待排程 (${timeTree.unassigned.length})`, '待排程', '', '', standardFolderColor, 'time_unassigned');
                    timeTree.unassigned.forEach(item => renderDrawerTask(item, '待排程', unassignedFolder.querySelector('.target-inner')));
                    container.appendChild(unassignedFolder);
                }

                Object.keys(timeTree.years).sort((a, b) => b - a).forEach(y => {
                    const yFolder = createFolderDom(`${y}年`, null, '', '', standardFolderColor, `time_y_${y}`);
                    Object.keys(timeTree.years[y]).sort((a, b) => b - a).forEach(m => {
                        const mFolder = createFolderDom(`${m}月`, null, '', '', standardFolderColor, `time_m_${y}_${m}`);
                        Object.keys(timeTree.years[y][m]).sort((a, b) => b - a).forEach(w => {
                            const wFolder = createFolderDom(`第${w}周`, null, '', '', standardFolderColor, `time_w_${y}_${m}_${w}`);
                            Object.keys(timeTree.years[y][m][w]).sort((a, b) => b.localeCompare(a)).forEach(dayStr => {
                                const dayData = timeTree.years[y][m][w][dayStr];
                                const dFolder = createFolderDom(`${dayStr} (${dayData.wd})`, dayStr, '', '', standardFolderColor, `time_d_${dayStr}`);
                                dayData.items.forEach(item => renderDrawerTask(item, dayStr, dFolder.querySelector('.target-inner')));
                                wFolder.querySelector('.target-inner').appendChild(dFolder);
                            });
                            mFolder.querySelector('.target-inner').appendChild(wFolder);
                        });
                        yFolder.querySelector('.target-inner').appendChild(mFolder);
                    });
                    container.appendChild(yFolder);
                });
                return;
            }

            let categories = [];
            if (currentMode === 'group') categories = [...new Set(appState.batches.map(b => b.title))];
            else if (currentMode === 'subject') categories = appState.subjects;
            else if (currentMode === 'tag') categories = appState.tags.map(t => t.name);

            categories.forEach(catName => {
                let matchingItems = [];
                appState.batches.forEach(batch => {
                    batch.subtasks.forEach(subtask => {
                        let match = false;
                        if (currentMode === 'group') match = batch.title === catName;
                        else if (currentMode === 'subject') match = batch.subject === catName;
                        else if (currentMode === 'tag') match = batch.tags.includes(catName);
                        if (match) matchingItems.push({ batch, subtask });
                    });
                });

                let folderContextAttr = '', hoverAddHtml = '', delHtml = '', dropVal = catName;
                if (currentMode === 'group') {
                    dropVal = 'group_disabled';
                    const batch = appState.batches.find(b => b.title === catName);
                    if (batch) {
                        folderContextAttr = `oncontextmenu="handleContextMenu(event, 'folder_main', '${batch.id}')"`;
                        hoverAddHtml = `<button onclick="event.stopPropagation(); executeContextMenuActionObj('folder_main', '${batch.id}', null, 'add_subtask')" class="opacity-0 group-hover:opacity-100 text-[var(--md-sys-color-outline)] hover:text-[var(--md-sys-color-primary)] transition-opacity p-0.5"><span class="material-symbols-outlined text-sm">add</span></button>`;
                    }
                } else if (currentMode === 'subject') {
                    dropVal = 'subject_disabled';
                    folderContextAttr = `oncontextmenu="handleContextMenu(event, 'folder_subject', '${catName}')"`;
                    hoverAddHtml = `<button onclick="event.stopPropagation(); executeContextMenuActionObj('folder_subject', '${catName}', null, 'add_subject_task')" class="opacity-0 group-hover:opacity-100 text-[var(--md-sys-color-outline)] hover:text-[var(--md-sys-color-primary)] transition-opacity p-0.5"><span class="material-symbols-outlined text-sm">add</span></button>`;
                    delHtml = `<button onclick="event.stopPropagation(); deleteMetaAsset('${currentMode}', '${catName}')" class="opacity-0 group-hover:opacity-100 text-[var(--md-sys-color-outline)] hover:text-red-500 transition-opacity p-0.5"><span class="material-symbols-outlined text-sm">delete</span></button>`;
                } else if (currentMode === 'tag') {
                    folderContextAttr = `oncontextmenu="handleContextMenu(event, 'folder_tag', '${catName}')"`;
                    delHtml = `<button onclick="event.stopPropagation(); deleteMetaAsset('${currentMode}', '${catName}')" class="opacity-0 group-hover:opacity-100 text-[var(--md-sys-color-outline)] hover:text-red-500 transition-opacity p-0.5"><span class="material-symbols-outlined text-sm">delete</span></button>`;
                }

                // Fix: When arranged by tag, folders adopt custom tag color, otherwise standard primary color is used.
                let folderIconColor = standardFolderColor;
                if (currentMode === 'tag') {
                    const tagObj = appState.tags.find(t => t.name === catName);
                    if (tagObj) {
                        folderIconColor = tagObj.color;
                    }
                }

                const catFolderId = `${currentMode}_${catName.replace(/<[^>]*>?/gm, '')}`;
                const wrapper = createFolderDom(`${catName} <span class="text-[10px] font-normal text-[var(--md-sys-color-outline)] ml-1">(${matchingItems.length})</span>`, dropVal, folderContextAttr, hoverAddHtml + delHtml, folderIconColor, catFolderId);
                const innerContainer = wrapper.querySelector(".target-inner");

                if (matchingItems.length === 0) innerContainer.innerHTML = `<div class="text-[10px] text-[var(--md-sys-color-outline)] p-2 text-center border border-dashed rounded-lg border-[var(--md-sys-color-outline-variant)]">空</div>`;
                else {
                    if (currentMode === 'group') {
                        matchingItems.forEach(item => { renderDrawerTask(item, catName, innerContainer); });
                    } else {
                        const batchMap = new Map();
                        matchingItems.forEach(item => {
                            if (!batchMap.has(item.batch.id)) batchMap.set(item.batch.id, { batch: item.batch, subtasks: [] });
                            batchMap.get(item.batch.id).subtasks.push(item.subtask);
                        });
                        batchMap.forEach((data, batchId) => {
                            let subCtxAttr = currentMode === 'tag' ? `oncontextmenu="handleContextMenu(event, 'folder_batch_tag', '${data.batch.id}', null, '${catName}')"` : `oncontextmenu="handleContextMenu(event, 'folder_main', '${data.batch.id}')"`;
                            const subFolderId = `${currentMode}_${catName}_${data.batch.id}`;
                            const subFolder = createFolderDom(data.batch.title, null, subCtxAttr, '', folderIconColor, subFolderId);
                            data.subtasks.forEach(sub => {
                                renderDrawerTask({ batch: data.batch, subtask: sub }, catName, subFolder.querySelector('.target-inner'));
                            });
                            innerContainer.appendChild(subFolder);
                        });
                    }
                }
                container.appendChild(wrapper);
            });
        }

        function renderDrawerTask(item, catName, container) {
            const { batch, subtask } = item;
            const taskEl = document.createElement("div");
            taskEl.className = `p-2 rounded-lg border flex flex-col gap-1 bg-[var(--md-sys-color-surface-container-highest)] border-[var(--md-sys-color-outline-variant)] cursor-grab active:cursor-grabbing hover:shadow-sm transition-shadow ${subtask.done ? 'opacity-50 saturate-50 line-through' : ''}`;
            taskEl.setAttribute("draggable", "true");
            taskEl.setAttribute("data-subtask-id", subtask.id);
            taskEl.addEventListener("dragstart", (e) => handleSubtaskDragStart(e, subtask.id));
            let timer;
            taskEl.addEventListener("touchstart", (e) => {
                timer = setTimeout(() => handleContextMenu(e, 'task_drawer', batch.id, subtask.id, catName), 500);
            });
            taskEl.addEventListener("touchend", () => clearTimeout(timer));
            taskEl.addEventListener("touchmove", () => clearTimeout(timer));
            taskEl.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_drawer', batch.id, subtask.id, catName));

            taskEl.addEventListener("click", () => {
                if (document.getElementById('view-home').classList.contains('active')) {
                    switchView('home');
                    setTimeout(() => {
                        const el = document.getElementById('home-sub-' + subtask.id);
                        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('locate-highlight'); setTimeout(() => el.classList.remove('locate-highlight'), 2000); }
                    }, 300);
                } else if (subtask.endDate) { jumpToCalendar(subtask.endDate); }
            });

            taskEl.innerHTML = `
                <div class="flex justify-between items-center text-[9px]">
                    <span class="font-bold px-1.5 rounded shadow-sm" style="background-color:${subjectColors[batch.subject]?.bg || '#E0E0E0'}; color:${subjectColors[batch.subject]?.text || '#333'};">${batch.subject}</span>
                    <span class="text-[var(--md-sys-color-outline)] font-mono">${subtask.endDate ? subtask.endDate.substring(5) : '待排程'}</span>
                </div>
                <div class="text-xs font-bold truncate text-[var(--md-sys-color-on-surface)]" title="${subtask.text}">${subtask.text}</div>
            `;
            container.appendChild(taskEl);
        }

        function deleteMetaAsset(dimension, itemValue) {
            if (dimension === 'subject') appState.subjects = appState.subjects.filter(s => s !== itemValue);
            else if (dimension === 'tag') {
                appState.tags = appState.tags.filter(t => t.name !== itemValue);
                appState.batches.forEach(b => { b.tags = b.tags.filter(t => t !== itemValue); });
            }
            saveStateToStorage();
            renderAllComponents();
        }

        function changeDrawerArrange(dimension) {
            if (appState.currentDrawerArrange !== dimension) {
                drawerFolderStates = {}; // Clear folder expanded cache
            }
            appState.currentDrawerArrange = dimension;
            document.querySelectorAll("#drawer-filter-chips button").forEach(btn => btn.className = 'text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0');
            document.getElementById(`chip-${dimension}`).className = 'chip-active text-[11px] py-1.5 px-3 rounded-full text-center font-semibold md-ripple border border-[var(--md-sys-color-outline-variant)] bg-transparent whitespace-nowrap flex-shrink-0';
            const quickAdd = document.getElementById('drawer-quick-add-container');
            const colorInput = document.getElementById('drawer-quick-color');
            if (dimension === 'subject' || dimension === 'tag') {
                quickAdd.style.display = 'flex';
                if (dimension === 'tag') colorInput.classList.remove('hidden');
                else colorInput.classList.add('hidden');
            } else { quickAdd.style.display = 'none'; }
            renderLeftDrawerPool();
        }

        function renderHomeChecklist() {
            const container = document.getElementById("home-checklist-container");
            container.innerHTML = "";
            const filteredBatches = appState.batches.filter(b => {
                const query = appState.searchQuery.toLowerCase();
                const keywords = query.split(/\s+/).filter(k => k);
                if (!keywords.length) return true;
                const combinedText = (b.title + ' ' + b.content + ' ' + b.subject + ' ' + b.tags.join(' ') + ' ' + b.subtasks.map(s => s.text + ' ' + (s.endDate || '')).join(' ')).toLowerCase();
                return keywords.every(k => combinedText.includes(k));
            });
            if (!filteredBatches.length) {
                container.innerHTML = `<div class="text-xs text-[var(--md-sys-color-outline)] p-10 text-center bg-[var(--md-sys-color-surface-container-low)] rounded-2xl border border-dashed border-[var(--md-sys-color-outline-variant)]">暂无契合指标，去部署新的战斗任务吧！</div>`;
                return;
            }
            filteredBatches.forEach(batch => {
                const box = document.createElement("div");
                box.className = "p-4 md:p-5 rounded-2xl flex flex-col gap-3 border shadow-sm bg-[var(--md-sys-color-surface-container-lowest)] border-[var(--md-sys-color-outline-variant)] hover:shadow-md transition-shadow";
                let tagsHtml = batch.tags.map(tagName => {
                    const tObj = appState.tags.find(t => t.name === tagName);
                    return `<span class="text-[9px] px-1.5 py-0.5 rounded-full text-white font-bold shadow-sm" style="background-color: ${tObj?.color || '#6750A4'};">${tagName}</span>`;
                }).join('');
                box.innerHTML = `
                    <div class="flex justify-between items-start gap-2">
                        <div class="flex items-center flex-wrap gap-2 flex-1">
                            <h5 class="text-sm font-black text-[var(--md-sys-color-primary)]">${batch.title}</h5>
                            <span class="text-[10px] px-2 py-0.5 rounded-full font-bold shadow-sm" style="background-color: ${subjectColors[batch.subject]?.bg || '#E0E0E0'}; color: ${subjectColors[batch.subject]?.text || '#333'};">${batch.subject}</span>
                            ${tagsHtml}
                        </div>
                        <div class="flex items-center gap-1 flex-shrink-0">
                            <button onclick="openEditTaskModal('${batch.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-[var(--md-sys-color-outline)] hover:text-[var(--md-sys-color-primary)] hover:bg-[var(--md-sys-color-primary)]/10 transition-colors"><span class="material-symbols-outlined text-[20px]">edit</span></button>
                            <button onclick="deleteEntireBatch('${batch.id}')" class="w-8 h-8 rounded-full flex items-center justify-center text-[var(--md-sys-color-outline)] hover:text-red-500 hover:bg-red-500/10 transition-colors"><span class="material-symbols-outlined text-[20px]">delete_sweep</span></button>
                        </div>
                    </div>
                    <p class="text-[11px] md:text-xs text-[var(--md-sys-color-on-surface-variant)] mb-1 pl-1 border-l-2 border-[var(--md-sys-color-outline-variant)]">${batch.content}</p>
                    <div class="subtask-list-zone flex flex-col gap-1.5 pt-2 border-t border-dashed border-[var(--md-sys-color-outline-variant)]"></div>
                `;
                const subContainer = box.querySelector(".subtask-list-zone");
                batch.subtasks.forEach(sub => {
                    const subRow = document.createElement("div");
                    subRow.id = `home-sub-${sub.id}`;
                    subRow.className = "flex items-center justify-between p-2.5 rounded-xl bg-[var(--md-sys-color-surface-container-low)] border border-transparent text-xs cursor-grab active:cursor-grabbing hover:bg-[var(--md-sys-color-surface-container-high)] hover:border-[var(--md-sys-color-outline-variant)] transition-all";
                    subRow.setAttribute("draggable", "true");

                    subRow.addEventListener("dragstart", (e) => handleSubtaskDragStart(e, sub.id));
                    let timer;
                    subRow.addEventListener("touchstart", (e) => { timer = setTimeout(() => handleContextMenu(e, 'task_home', batch.id, sub.id), 500); });
                    subRow.addEventListener("touchend", () => clearTimeout(timer));
                    subRow.addEventListener("touchmove", () => clearTimeout(timer));
                    subRow.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_home', batch.id, sub.id));
                    subRow.addEventListener("click", (e) => {
                        if (e.target.tagName.toLowerCase() === 'input' || e.target.tagName.toLowerCase() === 'button' || e.target.closest('button')) return;
                        // Auto detect best category on navigation trigger
                        const query = document.getElementById('global-search').value.trim();
                        expandToDrawerTask(sub.id, query);
                    });

                    subRow.innerHTML = `
                        <label class="flex items-center gap-3 cursor-pointer flex-1 overflow-hidden">
                            <div class="relative flex items-center justify-center flex-shrink-0">
                                <input type="checkbox" ${sub.done ? 'checked' : ''} onchange="toggleSubtaskStatus('${sub.id}')" class="w-4 h-4 appearance-none rounded border-2 border-[var(--md-sys-color-outline)] checked:border-[var(--md-sys-color-primary)] checked:bg-[var(--md-sys-color-primary)] transition-colors peer" onclick="event.stopPropagation()"/>
                                <span class="material-symbols-outlined text-[14px] text-white absolute opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity font-bold">check</span>
                            </div>
                            <span class="font-medium truncate text-[var(--md-sys-color-on-surface)] transition-all ${sub.done ? 'line-through opacity-50 saturate-50' : ''}">${sub.text}</span>
                        </label>
                        <button onclick="openDatePicker('${sub.id}', event)" class="text-[10px] flex-shrink-0 ml-2 text-[var(--md-sys-color-on-secondary-container)] font-mono font-bold bg-[var(--md-sys-color-secondary-container)] hover:brightness-110 px-2 py-1 rounded-lg transition-all md-ripple">${sub.endDate ? sub.endDate : '设置日期'}</button>
                    `;
                    subContainer.appendChild(subRow);
                });
                container.appendChild(box);
            });
        }

        function getWeekNumberInMonth(dateStr) {
            const d = new Date(dateStr);
            const firstDay = new Date(d.getFullYear(), d.getMonth(), 1);
            const pastDays = d.getDate() + (firstDay.getDay() === 0 ? 7 : firstDay.getDay()) - 1;
            return Math.ceil(pastDays / 7);
        }

        function getDatesForWeek(dateStr) {
            const d = new Date(dateStr);
            let day = d.getDay();
            if (day === 0) day = 7;
            d.setDate(d.getDate() - day + 1);
            const dates = [];
            for (let i = 0; i < 7; i++) {
                dates.push(new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0]);
                d.setDate(d.getDate() + 1);
            }
            return dates;
        }

        function switchCalendarDate(dir) {
            if (appState.calendarMode === 'month') {
                appState.calendarMonth += dir;
                if (appState.calendarMonth > 12) { appState.calendarMonth = 1; appState.calendarYear++; }
                if (appState.calendarMonth < 1) { appState.calendarMonth = 12; appState.calendarYear--; }
                appState.focusedDate = `${appState.calendarYear}-${String(appState.calendarMonth).padStart(2, '0')}-01`;
                renderCalendarWorkspace();
            } else {
                // Instantly slide via programmed triggers
                const track = document.getElementById('slider-track');
                if (track) {
                    track.style.transition = 'transform 0.25s cubic-bezier(0.2, 0, 0, 1)';
                    const targetPercent = dir === 1 ? -66.6666 : 0;
                    track.style.transform = `translateX(${targetPercent}%)`;
                    setTimeout(() => {
                        const d = new Date(appState.focusedDate);
                        d.setDate(d.getDate() + dir * 7);
                        appState.focusedDate = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
                        appState.calendarMonth = d.getMonth() + 1;
                        appState.calendarYear = d.getFullYear();

                        track.style.transition = 'none';
                        track.style.transform = `translateX(-33.3333%)`;
                        renderCalendarWorkspace();
                    }, 250);
                }
            }
        }

        function switchCalendarMode(mode) {
            appState.calendarMode = mode;
            const activeClass = 'px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs font-semibold bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] transition-all';
            const inactiveClass = 'px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs font-semibold text-[var(--md-sys-color-on-surface-variant)] hover:bg-black/5 transition-colors';

            document.getElementById("view-mode-month").className = mode === 'month' ? activeClass : inactiveClass;
            document.getElementById("view-mode-week").className = mode === 'week' ? activeClass : inactiveClass;

            const calViewWrapper = document.getElementById("calendar-month-view-wrapper");
            const tlPane = document.getElementById("calendar-timeline-pane");

            calViewWrapper.classList.add("hidden");
            tlPane.classList.add("hidden");

            if (mode === 'week') {
                calViewWrapper.classList.remove("hidden");
                calViewWrapper.style.height = "auto";
                tlPane.classList.remove("hidden");
                focusDayTimeline(appState.focusedDate);
            } else if (mode === 'month') {
                calViewWrapper.classList.remove("hidden");
                calViewWrapper.style.height = "100%";
            }
            renderCalendarWorkspace();
        }

        function renderCalendarWorkspace() {
            const grid = document.getElementById("month-grid-container");
            grid.innerHTML = "";
            grid.className = `calendar-grid flex-1 w-full text-xs transition-all ${appState.calendarMode === 'week' ? 'calendar-grid-week' : 'calendar-grid-month'}`;
            const titleEl = document.getElementById("calendar-month-title");
            titleEl.innerText = `${appState.calendarYear}年 ${appState.calendarMonth}月`;

            const weeks = ["一", "二", "三", "四", "五", "六", "日"];
            weeks.forEach(w => {
                grid.insertAdjacentHTML('beforeend', `<div class="text-center font-bold py-1.5 md:py-2 border-b border-[var(--md-sys-color-outline-variant)] text-[var(--md-sys-color-on-surface-variant)]">${w}</div>`);
            });

            let daysToRender = [];
            if (appState.calendarMode === 'month') {
                const firstDay = new Date(appState.calendarYear, appState.calendarMonth - 1, 1).getDay();
                const startOffset = firstDay === 0 ? 7 : firstDay;
                const totalDays = new Date(appState.calendarYear, appState.calendarMonth, 0).getDate();
                for (let i = startOffset - 1; i > 0; i--) daysToRender.push(null);
                for (let day = 1; day <= totalDays; day++) daysToRender.push(`${appState.calendarYear}-${String(appState.calendarMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`);
                while (daysToRender.length < 42) daysToRender.push(null);
            } else { daysToRender = getDatesForWeek(appState.focusedDate); }

            daysToRender.forEach(finalDateStr => {
                const cell = document.createElement("div");
                if (!finalDateStr) {
                    cell.className = "p-1 bg-[var(--md-sys-color-surface-container-highest)] border-r border-b border-[var(--md-sys-color-outline-variant)] min-h-[40px] md:min-h-[60px] opacity-40";
                    grid.appendChild(cell); return;
                }
                const isToday = finalDateStr === TODAY_STR;
                const isFocused = finalDateStr === appState.focusedDate;
                const dayNum = parseInt(finalDateStr.split('-')[2]);
                cell.className = `p-1 border-r border-b border-[var(--md-sys-color-outline-variant)] flex flex-col gap-1 hover:bg-black/5 dark:hover:bg-white/5 cursor-pointer transition-colors min-h-[50px] md:min-h-[60px] relative ${isFocused && appState.calendarMode === 'week' ? 'bg-[var(--md-sys-color-secondary-container)]/40 shadow-inner' : ''}`;
                cell.setAttribute("data-date", finalDateStr);
                cell.innerHTML = `
                    <div class="flex justify-between items-center px-1 pt-0.5 md:pt-1 flex-shrink-0">
                        <span class="w-1.5 h-1.5 rounded-full ${isFocused && appState.calendarMode === 'week' ? 'bg-[var(--md-sys-color-primary)]' : 'bg-transparent'}"></span>
                        <span class="w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center font-black text-[10px] md:text-[11px] ${isToday ? 'bg-[var(--md-sys-color-primary)] text-[var(--md-sys-color-on-primary)] shadow-md' : 'text-[var(--md-sys-color-on-surface-variant)]'}">${dayNum}</span>
                    </div>
                `;
                let counter = 0;
                cell.addEventListener("dragenter", (e) => { e.preventDefault(); counter++; if (counter === 1) cell.classList.add("drag-hover"); });
                cell.addEventListener("dragleave", () => { counter--; if (counter === 0) cell.classList.remove("drag-hover"); });
                cell.addEventListener("drop", (e) => { counter = 0; cell.classList.remove("drag-hover"); dropToCalendarCell(e, finalDateStr, cell); });
                cell.addEventListener("dragover", allowDrop);
                cell.addEventListener("click", () => {
                    appState.focusedDate = finalDateStr;
                    if (appState.calendarMode === 'month') switchCalendarMode('week');
                    else { renderCalendarWorkspace(); focusDayTimeline(finalDateStr); }
                });

                const taskBox = document.createElement("div");
                taskBox.className = "flex flex-col gap-1 px-0.5 md:px-1 flex-1 overflow-y-auto md-scrollbar pb-1";

                if (appState.calendarMode === 'month') {
                    taskBox.classList.add("max-h-[80px]");
                } else {
                    taskBox.classList.add("max-h-[120px]");
                }

                appState.batches.forEach(batch => {
                    batch.subtasks.forEach(subtask => {
                        if (subtask.endDate === finalDateStr) {
                            const block = document.createElement("div");
                            block.id = `cal-sub-${subtask.id}`;
                            block.className = `text-[8px] md:text-[9px] px-1 md:px-1.5 py-0.5 md:py-1 rounded truncate font-bold text-white shadow-sm cursor-grab hover:brightness-110 active:scale-95 transition-all ${subtask.done ? 'opacity-50 line-through saturate-50' : ''}`;
                            block.style.backgroundColor = subjectColors[batch.subject]?.text || "#6750A4";
                            block.style.minHeight = "20px";
                            block.style.flexShrink = "0";
                            block.innerText = subtask.text;
                            block.setAttribute("draggable", "true");

                            block.addEventListener("dragstart", (e) => handleSubtaskDragStart(e, subtask.id));
                            let timer;
                            block.addEventListener("touchstart", (e) => { timer = setTimeout(() => handleContextMenu(e, 'task_calendar', batch.id, subtask.id), 500); });
                            block.addEventListener("touchend", () => clearTimeout(timer));
                            block.addEventListener("touchmove", () => clearTimeout(timer));
                            block.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_calendar', batch.id, subtask.id));
                            block.addEventListener("mousemove", (e) => showGlobalTooltip(e, subtask.id));
                            block.addEventListener("mouseleave", hideGlobalTooltip);
                            block.addEventListener("click", (e) => { e.stopPropagation(); expandToDrawerTask(subtask.id); });

                            taskBox.appendChild(block);
                        }
                    });
                });
                cell.appendChild(taskBox);
                grid.appendChild(cell);
            });

            if (appState.calendarMode === 'week') {
                focusDayTimeline(appState.focusedDate);
            }
        }

        // Render adjacent timeline panes side-by-side inside sliding track (mobile swiping deleted)
        function focusDayTimeline(centerDateStr) {
            if (appState.calendarMode !== 'week') return;
            document.getElementById("timeline-focused-title").innerHTML = `<span class="material-symbols-outlined text-sm">schedule</span> ${centerDateStr.substring(5)} 时间轴`;

            const prevDateStr = getAdjacentDateStr(centerDateStr, -1);
            const nextDateStr = getAdjacentDateStr(centerDateStr, 1);

            renderTimelinePaneContent("slider-pane-prev", prevDateStr);
            renderTimelinePaneContent("slider-pane-current", centerDateStr);
            renderTimelinePaneContent("slider-pane-next", nextDateStr);
        }

        function getAdjacentDateStr(baseDateStr, delta) {
            const d = new Date(baseDateStr);
            d.setDate(d.getDate() + delta);
            return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
        }

        function renderTimelinePaneContent(paneId, dateStr) {
            const pane = document.getElementById(paneId);
            if (!pane) return;
            pane.innerHTML = "";

            const container = document.createElement("div");
            container.className = "timeline-track-container w-full relative";
            container.id = `timeline-track-${paneId}`;

            // Allow dropped items
            container.addEventListener("dragover", allowDrop);
            container.addEventListener("drop", dropToTimelineTrack);

            // Render bg hours
            const bgTrack = document.createElement("div");
            bgTrack.className = "absolute inset-0 z-0 pointer-events-none";
            for (let h = 0; h < 24; h++) {
                const row = document.createElement("div");
                row.className = "timeline-hour-row flex items-start pl-10 md:pl-12 pt-1 border-[var(--md-sys-color-outline-variant)]";
                row.innerHTML = `<span class="absolute left-1 md:left-2 text-[9px] md:text-[10px] font-mono text-[var(--md-sys-color-outline)] font-bold">${h < 10 ? '0' + h : h}:00</span>`;
                bgTrack.appendChild(row);
            }
            container.appendChild(bgTrack);

            // Render timeline cards pool
            const cardPool = document.createElement("div");
            cardPool.className = "absolute top-0 bottom-0 left-12 md:left-14 right-2 md:right-4 z-10";

            let dayTasks = [];
            appState.batches.forEach(b => b.subtasks.forEach(s => {
                if (s.endDate === dateStr && s.startMinute !== null && s.startMinute !== undefined) {
                    dayTasks.push({ batch: b, subtask: s });
                }
            }));
            dayTasks.sort((a, b) => a.subtask.startMinute - b.subtask.startMinute);

            let overlapGroups = [];
            dayTasks.forEach(task => {
                let placed = false;
                for (let group of overlapGroups) {
                    let overlaps = group.some(other => {
                        const s1 = task.subtask.startMinute, e1 = s1 + task.subtask.durationMinutes;
                        const s2 = other.subtask.startMinute, e2 = s2 + other.subtask.durationMinutes;
                        return Math.max(s1, s2) < Math.min(e1, e2);
                    });
                    if (overlaps) { group.push(task); task.colIndex = group.length - 1; placed = true; break; }
                }
                if (!placed) { task.colIndex = 0; overlapGroups.push([task]); }
            });
            overlapGroups.forEach(group => group.forEach(t => t.groupTotal = group.length));

            dayTasks.forEach(item => {
                const { batch, subtask } = item;
                const topPx = subtask.startMinute;
                const heightPx = subtask.durationMinutes;
                const widthPct = 100 / item.groupTotal;
                const leftPct = item.colIndex * widthPct;
                const block = document.createElement("div");
                block.id = `tl-sub-${subtask.id}`;
                block.className = `absolute rounded-xl p-1.5 md:p-2.5 text-[10px] md:text-xs text-white font-bold shadow-md select-none group flex flex-col border border-white/20 transition-all active:scale-[0.99] active:shadow-lg ${subtask.done ? 'opacity-60 saturate-50 line-through' : ''}`;
                block.style.top = `${topPx}px`;
                block.style.height = `${heightPx}px`;
                block.style.left = `calc(${leftPct}% + 2px)`;
                block.style.width = `calc(${widthPct}% - 4px)`;
                block.style.backgroundColor = subjectColors[batch.subject]?.text || "var(--md-sys-color-primary)";
                let startH = String(Math.floor(subtask.startMinute / 60)).padStart(2, '0');
                let startM = String(subtask.startMinute % 60).padStart(2, '0');
                block.innerHTML = `
                    <div class="flex-1 overflow-hidden pointer-events-none">
                        <div class="truncate">${subtask.text}</div>
                        <div class="text-[9px] md:text-[10px] opacity-90 font-mono mt-0.5 font-normal tracking-wide ${subtask.done ? 'hidden' : ''}">${startH}:${startM} (${subtask.durationMinutes}m)</div>
                    </div>
                    <div class="resize-handle" onmousedown="startTimelineResize(event, '${subtask.id}')" ontouchstart="startTimelineResize(event, '${subtask.id}')">
                        <div class="w-6 md:w-8 h-1 bg-white/40 rounded-full mx-auto mt-1 pointer-events-none group-hover:bg-white/80 transition-colors"></div>
                    </div>
                `;

                block.addEventListener("mousedown", (e) => { if (!e.target.closest('.resize-handle')) startTimelineCardDrag(e, subtask.id); });
                block.addEventListener("touchstart", (e) => { if (!e.target.closest('.resize-handle')) startTimelineCardDrag(e, subtask.id); }, { passive: false });

                let timer;
                block.addEventListener("touchstart", (e) => { timer = setTimeout(() => handleContextMenu(e, 'task_calendar', batch.id, subtask.id), 500); });
                block.addEventListener("touchend", () => clearTimeout(timer));
                block.addEventListener("touchmove", () => clearTimeout(timer));
                block.addEventListener("contextmenu", (e) => handleContextMenu(e, 'task_calendar', batch.id, subtask.id));
                block.addEventListener("mousemove", (e) => showGlobalTooltip(e, subtask.id));
                block.addEventListener("mouseleave", hideGlobalTooltip);
                cardPool.appendChild(block);
            });

            container.appendChild(cardPool);
            pane.appendChild(container);
        }

        function toggleModal(isOpen) {
            const backdrop = document.getElementById('modal-backdrop');
            const modal = backdrop.querySelector('.transform');
            if (isOpen) {
                backdrop.classList.remove('pointer-events-none', 'opacity-0');
                backdrop.classList.add('opacity-100', 'pointer-events-auto');
                modal?.classList.replace('scale-90', 'scale-100');
            } else {
                modal?.classList.replace('scale-100', 'scale-90');
                backdrop.classList.remove('opacity-100', 'pointer-events-auto');
                backdrop.classList.add('opacity-0', 'pointer-events-none');
            }
        }

        function openAddTaskModal() {
            document.getElementById("modal-form-title").innerText = "创建新任务";
            document.getElementById("form-task-id").value = "";
            document.getElementById("form-subject-container").innerHTML = appState.subjects.map(sub =>
                `<button type="button" onclick="selectFormSubject('${sub}')" id="form-sub-${sub}" class="px-3.5 py-1.5 rounded-full text-[11px] font-bold border border-[var(--md-sys-color-outline-variant)] transition-all hover:bg-black/5 ${appState.selectedFormSubject === sub ? 'chip-active shadow-sm' : 'text-[var(--md-sys-color-on-surface-variant)]'}">${sub}</button>`
            ).join('');

            const batch = appState.batches.find(b => b.id === batchId);
            if (!batch) return;
            openAddTaskModal();
            document.getElementById("modal-form-title").innerText = "编辑任务";

                    <input type="text" value="${sub.text}" required class="flex-1 p-2 rounded-lg border text-xs bg-[var(--md-sys-color-surface-container-lowest)] outline-none focus:border-[var(--md-sys-color-primary)] transition-colors checklist-text-input" onkeydown="if(event.key==='Enter'){event.preventDefault(); addChecklistItemSlot(this);}" />
                    <div class="flex items-center gap-1 w-20">
                        <span class="text-[10px] text-[var(--md-sys-color-outline)]">权重</span>
                        <input type="number" min="1" value="${sub.weight || 1}" class="w-full p-1.5 rounded-lg border text-xs bg-[var(--md-sys-color-surface-container-lowest)] border-[var(--md-sys-color-outline-variant)] outline-none focus:border-[var(--md-sys-color-primary)] transition-colors checklist-weight-input" />
                    </div>
                    <button type="button" onclick="this.parentElement.remove()" class="text-[var(--md-sys-color-outline)] hover:text-red-500 transition-colors p-1"><span class="material-symbols-outlined text-lg">do_not_disturb_on</span></button>

        function closeAddTaskModal() { toggleModal(false); }

        function renderFormTagsPool() {
            const container = document.getElementById("form-tags-list");
            let html = appState.tags.map(t => {
                const isSel = appState.selectedFormTags.includes(t.name);
                return `<button type="button" onclick="toggleFormTagSelection('${t.name}')" class="px-3 py-1 rounded-full text-[10px] font-bold shadow-sm border border-transparent transition-transform active:scale-95" style="background-color: ${isSel ? t.color : 'var(--md-sys-color-surface-variant)'}; color: ${isSel ? '#FFF' : 'var(--md-sys-color-on-surface-variant)'};">${t.name}</button>`;
            }).join('');
            html += `<button type="button" onclick="showAddTagUI()" id="btn-show-add-tag" class="px-3 py-1 rounded-full text-[10px] font-bold border border-dashed border-[var(--md-sys-color-outline)] text-[var(--md-sys-color-outline)] hover:bg-black/5 dark:hover:bg-white/5 flex items-center gap-1 transition-colors"><span class="material-symbols-outlined text-[14px]">add</span>新建</button>`;
            html += `<div id="new-tag-ui" class="hidden items-center gap-1.5 bg-[var(--md-sys-color-surface-container-highest)] px-2 py-1 rounded-full border border-[var(--md-sys-color-outline-variant)] shadow-inner w-full sm:w-auto mt-1 sm:mt-0">

                <input type="text" id="new-tag-name-input" placeholder="标签名..." class="w-20 sm:w-24 bg-transparent text-[11px] font-bold outline-none text-[var(--md-sys-color-on-surface)] placeholder-gray-400">
                <button type="button" onclick="saveNewTag()" class="text-[var(--md-sys-color-primary)] hover:brightness-110 flex items-center p-0.5"><span class="material-symbols-outlined text-[16px]">check_circle</span></button>
                <button type="button" onclick="hideAddTagUI()" class="text-[var(--md-sys-color-outline)] hover:text-red-500 flex items-center p-0.5"><span class="material-symbols-outlined text-[16px]">cancel</span></button>
            </div>`;
            container.innerHTML = html;

        function showAddTagUI() {
            document.getElementById('btn-show-add-tag').classList.add('hidden');
            document.getElementById('new-tag-ui').classList.remove('hidden');
            document.getElementById('new-tag-ui').classList.add('flex');
            document.getElementById('new-tag-name-input').focus();
        }

        function hideAddTagUI() {
            document.getElementById('btn-show-add-tag').classList.remove('hidden');
            document.getElementById('new-tag-ui').classList.add('hidden');
            document.getElementById('new-tag-ui').classList.remove('flex');
        }

        function saveNewTag() {
            const name = document.getElementById('new-tag-name-input').value.trim();
            const color = document.getElementById('new-tag-color-input').value;
            if (!name) { alert('请输入标签名'); return; }
            if (appState.tags.some(t => t.name === name)) { alert('标签已存在'); return; }
            appState.tags.push({ name, color });
            appState.selectedFormTags.push(name);
            saveStateToStorage();
            renderFormTagsPool();
            if (appState.currentDrawerArrange === 'tag') renderLeftDrawerPool();
        }

        function toggleFormTagSelection(tagName) {
            appState.selectedFormTags = appState.selectedFormTags.includes(tagName) ? appState.selectedFormTags.filter(t => t !== tagName) : [...appState.selectedFormTags, tagName];
            renderFormTagsPool();
        }

        function selectFormSubject(sub) {
            appState.selectedFormSubject = sub;
            document.querySelectorAll("#form-subject-container button").forEach(b => {
                b.classList.remove("chip-active", "shadow-sm");
                b.classList.add("text-[var(--md-sys-color-on-surface-variant)]");
            });
            const el = document.getElementById(`form-sub-${sub}`);
            if (el) {
                el.classList.add("chip-active", "shadow-sm");
                el.classList.remove("text-[var(--md-sys-color-on-surface-variant)]");
            }
        }

        function addChecklistItemSlot(currentInput = null) {
            const box = document.getElementById("form-checklist-slots");
            const div = document.createElement("div");
            div.className = "flex gap-2 items-center group";
            div.innerHTML = `
                <input type="text" placeholder="如：数学暑假作业卷一" required class="flex-1 p-2.5 rounded-xl border text-xs bg-[var(--md-sys-color-surface-container-lowest)] border-[var(--md-sys-color-outline-variant)] outline-none focus:border-[var(--md-sys-color-primary)] transition-colors checklist-text-input" onkeydown="if(event.key==='Enter'){event.preventDefault(); addChecklistItemSlot(this);}" />
                <div class="flex items-center gap-1 w-20">
                    <span class="text-[10px] text-[var(--md-sys-color-outline)]">权重</span>
                    <input type="number" min="1" value="1" class="w-full p-1.5 rounded-lg border text-xs bg-[var(--md-sys-color-surface-container-lowest)] border-[var(--md-sys-color-outline-variant)] outline-none focus:border-[var(--md-sys-color-primary)] transition-colors checklist-weight-input" />
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="text-[var(--md-sys-color-outline)] hover:text-red-500 transition-colors p-1"><span class="material-symbols-outlined text-lg">do_not_disturb_on</span></button>
            `;
            if (currentInput && currentInput.parentElement) currentInput.parentElement.after(div);
            else box.appendChild(div);
